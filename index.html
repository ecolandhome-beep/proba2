<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MASTER-INSPECT AI: 3D Prototype</title>
    <style>
        :root { 
            --green: #0f0; 
            --bg: #000;
            --ui-height: 200px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--green); 
            font-family: monospace; overflow: hidden; touch-action: none;
            height: 100dvh; 
        }
        #app { display: flex; flex-direction: column; height: 100%; padding-bottom: env(safe-area-inset-bottom); }
        #canvas-container { 
            flex: 1; position: relative; background: #111; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .ui { 
            height: var(--ui-height); background: #0a0a0a; border-top: 1px solid var(--green); 
            padding: 10px 15px; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto auto 1fr 1fr; gap: 8px; z-index: 100;
        }
        #display { grid-column: span 2; text-align: center; padding: 8px; border: 1px solid var(--green); background: #001500; }
        #status { font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
        #res-val { font-size: 20px; font-weight: bold; color: white; }
        
        /* Индикатор уровня для помощи пользователю */
        #level-indicator { grid-column: span 2; height: 4px; background: #222; position: relative; border-radius: 2px; }
        #level-bar { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--green); transition: 0.1s; }

        button { 
            background: #000; color: var(--green); border: 1.5px solid var(--green); 
            font-weight: bold; font-family: inherit; font-size: 11px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; min-height: 44px; 
        }
        button:active { background: var(--green); color: #000; }
        button.reset { border-color: #f44; color: #f44; }
        
        #zoom-window { 
            position: absolute; top: 20px; right: 20px; width: 140px; height: 140px; 
            border: 2px solid var(--green); background: #000; display: none; 
            pointer-events: none; z-index: 1000; image-rendering: pixelated; 
        }
        #zoom-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <video id="v" style="display:none;" playsinline autoplay></video>
        <canvas id="c"></canvas>
        <div id="zoom-window"><canvas id="zoom-canvas"></canvas></div>
    </div>
    <div class="ui">
        <div id="display">
            <div id="status">ОЖИДАНИЕ ИНИЦИАЛИЗАЦИИ</div>
            <div id="res-val">---</div>
        </div>
        <div id="level-indicator"><div id="level-bar"></div></div>
        
        <button onclick="initCamera()">1. КАМЕРА</button>
        <button onclick="captureFrame()">2. ЗАХВАТ</button>
        <button class="reset" onclick="resetAll()">ОЧИСТКА</button>
        <button onclick="saveAndProcess()">3. В МОДЕЛЬ</button>
    </div>
</div>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', { alpha: false });
    const zoomWin = document.getElementById('zoom-window'), zc = document.getElementById('zoom-canvas'), zctx = zc.getContext('2d');
    const resVal = document.getElementById('res-val'), statusText = document.getElementById('status');
    const levelBar = document.getElementById('level-bar');

    let mmPerPx = 0, points = [], isCaptured = false, activePoint = null, baseImage = null;

    // Инициализация гироскопа (как опция, не блокирующая работу)
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            const tilt = Math.min(Math.max(e.gamma, -45), 45);
            levelBar.style.left = (50 + (tilt/45)*50) + '%';
        });
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            v.srcObject = stream;
            isCaptured = false;
            statusText.innerText = "ПРЯМОЙ ЭФИР: ВЫРАВНЯЙТЕ ОБЪЕКТ";
            requestAnimationFrame(liveView);
        } catch (err) {
            statusText.innerText = "ОШИБКА КАМЕРЫ";
            alert("Нужен доступ к камере");
        }
    }

    function liveView() {
        if (!isCaptured && v.videoWidth > 0) {
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            requestAnimationFrame(liveView);
        }
    }

    function captureFrame() {
        isCaptured = true;
        baseImage = document.createElement('canvas');
        baseImage.width = c.width;
        baseImage.height = c.height;
        baseImage.getContext('2d').drawImage(v, 0, 0);
        
        // Автоматический поиск маркера (синий ластик 40мм)
        detectMarker();
        renderScene();
    }

    function detectMarker() {
        const imgData = ctx.getImageData(0, 0, c.width, c.height).data;
        let hits = [];
        for (let i = 0; i < imgData.length; i += 128) {
            const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
            if (b > 120 && b > r * 1.6 && b > g * 1.6) {
                hits.push({x: (i/4)%c.width, y: Math.floor((i/4)/c.width)});
            }
        }
        if (hits.length > 30) {
            const minX = Math.min(...hits.map(h => h.x)), maxX = Math.max(...hits.map(h => h.x));
            mmPerPx = 40 / (maxX - minX);
            statusText.innerText = "МАСШТАБ ОК. УКАЖИТЕ ГРАНИЦЫ.";
        } else {
            statusText.innerText = "ЭТАЛОН НЕ НАЙДЕН. ИСПОЛЬЗУЙТЕ СИНИЙ ЦВЕТ.";
        }
    }

    function renderScene() {
        if (!baseImage) return;
        ctx.drawImage(baseImage, 0, 0);
        
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = Math.max(3, c.width / 400);
        ctx.fillStyle = '#0f0';
        ctx.font = `${Math.max(22, c.width / 45)}px monospace`;

        points.forEach((p, i) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, ctx.lineWidth * 3, 0, 7);
            ctx.stroke();
            ctx.fillText(i + 1, p.x + 20, p.y - 20);
        });

        if (points.length === 2) {
            const distPx = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
            const valMm = (distPx * mmPerPx).toFixed(2);
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.stroke();
            resVal.innerText = valMm + " MM";
        }
    }

    function handleInput(e) {
        if (!isCaptured) return;
        e.preventDefault();
        const rect = c.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        const x = (touch.clientX - rect.left) * (c.width / rect.width);
        const y = (touch.clientY - rect.top) * (c.height / rect.height);

        if (e.type === 'touchstart' || e.type === 'mousedown') {
            activePoint = points.find(p => Math.hypot(p.x - x, p.y - y) * (rect.width / c.width) < 40);
            if (!activePoint && points.length < 2) {
                activePoint = {x, y};
                points.push(activePoint);
            }
            zoomWin.style.display = 'block';
        }
        if (activePoint) {
            activePoint.x = x;
            activePoint.y = y;
            drawZoom(x, y);
            renderScene();
        }
    }

    function drawZoom(x, y) {
        const s = 100;
        zc.width = 200; zc.height = 200;
        zctx.imageSmoothingEnabled = false;
        zctx.drawImage(c, x - s/2, y - s/2, s, s, 0, 0, 200, 200);
        zctx.strokeStyle = 'red';
        zctx.lineWidth = 2;
        zctx.strokeRect(90, 90, 20, 20);
    }

    c.addEventListener('touchstart', handleInput, {passive: false});
    c.addEventListener('touchmove', handleInput, {passive: false});
    window.addEventListener('touchend', () => { zoomWin.style.display = 'none'; activePoint = null; });

    function resetAll() {
        points = [];
        resVal.innerText = "---";
        isCaptured = false;
        requestAnimationFrame(liveView);
    }

    function saveAndProcess() {
        if (points.length < 2) { alert("Нужно две точки замера"); return; }
        
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = c.width;
        finalCanvas.height = c.height;
        const fCtx = finalCanvas.getContext('2d');
        fCtx.drawImage(baseImage, 0, 0);
        
        // Впекаем данные в файл для будущего 3D движка
        fCtx.fillStyle = "rgba(0,0,0,0.7)";
        fCtx.fillRect(10, 10, 300, 60);
        fCtx.fillStyle = "#0f0";
        fCtx.font = "24px monospace";
        fCtx.fillText(`RES: ${resVal.innerText}`, 30, 45);

        const url = finalCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;color:#0f0;text-align:center;font-family:monospace;">
                <img src="${url}" style="max-width:100%;border-bottom:1px solid #0f0;">
                <p>ДАННЫЕ ЗАФИКСИРОВАНЫ ДЛЯ 3D ОБРАБОТКИ</p>
                <button onclick="window.close()" style="background:#0f0;color:#000;padding:10px 20px;border:none;">ВЕРНУТЬСЯ</button>
            </body>
        `);
    }
</script>
</body>
</html>
