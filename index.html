<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: Logic Anchor</title>
    <style>
        :root { --green: #0f0; --bg: #000; --blue: #007bff; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #view { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #111; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .ui { background: #0a0a0a; border-top: 1px solid var(--green); padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 100; }
        #display { grid-column: span 2; text-align: center; padding: 15px; border: 1px solid var(--green); background: #001500; }
        #res-val { font-size: 28px; font-weight: bold; color: white; }
        button { background: #000; color: var(--green); border: 2px solid var(--green); padding: 15px; font-weight: bold; }
        button:active { background: var(--green); color: #000; }
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <div id="display">
        <div id="status">ПОИСК СИНЕГО ЭТАЛОНА (40x20)</div>
        <div id="res-val">---</div>
    </div>
    <button onclick="initCamera()">1. СТАРТ</button>
    <button onclick="findBlueAnchor()">2. ЗАМЕР ПО ЯКОРЮ</button>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const resVal = document.getElementById('res-val');

    // БИБЛИОТЕКА ЭТАЛОНОВ (Ваш хэш)
    const anchors = {
        blueEraser: { w: 40, h: 20, ratio: 2.0, color: 'blue' }
    };

    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; };
    }

    function findBlueAnchor() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imgData.data;

        let points = [];
        for (let i = 0; i < d.length; i += 16) {
            let r = d[i], g = d[i+1], b = d[i+2];
            // Ищем синий цвет (высокий B при низких R и G)
            if (b > 100 && b > r * 1.5 && b > g * 1.5) {
                let x = (i/4) % canvas.width;
                let y = Math.floor((i/4) / canvas.width);
                points.push({x, y});
            }
        }

        if (points.length > 50) {
            const minX = Math.min(...points.map(p => p.x));
            const maxX = Math.max(...points.map(p => p.x));
            const minY = Math.min(...points.map(p => p.y));
            const maxY = Math.max(...points.map(p => p.y));

            const wPx = maxX - minX;
            const hPx = maxY - minY;
            const currentRatio = wPx / hPx;

            // Проверка по Хэшу соотношений (допуск 20% на наклон)
            if (currentRatio > 1.4 && currentRatio < 2.6) {
                ctx.strokeStyle = "cyan";
                ctx.lineWidth = 5;
                ctx.strokeRect(minX, minY, wPx, hPx);

                // Расчет: если длинная сторона (wPx) = 40мм
                const mmPerPx = 40 / wPx;
                resVal.innerText = `L: 40.00 | H: ${(hPx * mmPerPx).toFixed(2)} MM`;
                document.getElementById('status').innerText = "ЭТАЛОН ПОДТВЕРЖДЕН";
            } else {
                document.getElementById('status').innerText = "ОШИБКА ПРОПОРЦИЙ";
                resVal.innerText = "CHECK RATIO";
            }
        }
    }
</script>
</body>
</html>
