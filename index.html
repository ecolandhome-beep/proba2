<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI-AI Auto-Measure</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cvReady();"></script>
    <style>
        :root { --green: #0f0; }
        body { margin: 0; background: #000; color: var(--green); font-family: monospace; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        /* Видоискатель теперь занимает верхнюю часть и не лезет под кнопки */
        #view { position: relative; flex-grow: 1; background: #111; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        /* Панель управления всегда видна над адресной строкой */
        .ui-panel { height: 120px; background: #000; border-top: 2px solid var(--green); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; box-sizing: border-box; }
        
        button { background: #000; color: var(--green); border: 1px solid var(--green); text-transform: uppercase; font-size: 11px; }
        #res-box { grid-column: span 2; border: 1px dashed var(--green); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px; font-size: 10px; z-index: 5; }
    </style>
</head>
<body>

<div id="status">СИСТЕМА: ЗАГРУЗКА CV...</div>

<div id="view">
    <video id="v" playsinline muted></video>
    <canvas id="c"></canvas>
</div>

<div class="ui-panel">
    <button onclick="init()">СТАРТ КАМЕРЫ</button>
    <button onclick="autoCalibrate()">АВТО-ПОИСК ПАЧКИ</button>
    <div id="res-box">--- MM</div>
</div>

<script>
    let streamActive = false;
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let pxlPerMm = 0;

    function cvReady() { document.getElementById('status').innerText = "СИСТЕМА: ГОТОВА К АНАЛИЗУ"; }

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        v.srcObject = stream;
        v.play();
        streamActive = true;
        processFrame();
    }

    function processFrame() {
        if (!streamActive) return;
        
        // Отрисовка видео на канвас для анализа
        ctx.drawImage(v, 0, 0, c.width, c.height);
        
        // Здесь будет отрисовка сетки или найденных контуров
        if (pxlPerMm === 0) {
            ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
            ctx.strokeRect(c.width/4, c.height/4, c.width/2, c.height/2);
            document.getElementById('status').innerText = "ПОМЕСТИТЕ ПАЧКУ В ЦЕНТР";
        }
        
        requestAnimationFrame(processFrame);
    }

    function autoCalibrate() {
        // Имитация детекции контура (в след. версии добавим реальный Mat из OpenCV)
        // Сейчас фиксируем масштаб для пачки 85мм, занимающей 50% ширины экрана
        const simulatedPxlWidth = c.width * 0.5; 
        pxlPerMm = simulatedPxlWidth / 85; 
        
        document.getElementById('status').innerText = "ОТКАЛИБРОВАНО: 85.0 MM";
        document.getElementById('res-box').innerText = "READY";
    }

    // Авто-подстройка размера канваса под экран iPhone 13
    window.onload = () => {
        c.width = window.innerWidth;
        c.height = window.innerHeight * 0.75;
    };
</script>

</body>
</html>
</html>
