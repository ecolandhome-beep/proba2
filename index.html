<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: PMP Edition</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; }
        #view { position: relative; width: 100%; height: 60vh; background: #111; overflow: hidden; }
        video, #c { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .ui { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #display { grid-column: span 2; text-align: center; padding: 15px; border: 1px solid var(--green); background: #001500; }
        #res-val { font-size: 24px; font-weight: bold; color: white; margin: 5px 0; }
        button { background: #000; color: var(--green); border: 2px solid var(--green); padding: 15px; font-weight: bold; font-family: inherit; }
        #preview-area { grid-column: span 2; text-align: center; margin-top: 10px; }
        #preview-img { max-width: 100%; border: 1px solid #333; display: none; }
        .hint { font-size: 10px; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <div id="display">
        <div id="status">ЭТАЛОН: СИНИЙ ЛАСТИК (40x20)</div>
        <div id="res-val">READY</div>
    </div>
    <button onclick="initCamera()">1. КАМЕРА</button>
    <button onclick="process()">2. ЗАМЕР</button>
    
    <div id="preview-area">
        <img id="preview-img">
        <div id="save-hint" class="hint" style="display:none;">↑ Зажмите фото выше, чтобы сохранить в галерею</div>
    </div>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const resVal = document.getElementById('res-val');
    const previewImg = document.getElementById('preview-img');

    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1920 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };
    }

    function process() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imgData.data;
        let points = [];

        // Детекция синего цвета
        for (let i = 0; i < d.length; i += 32) {
            if (d[i+2] > 110 && d[i+2] > d[i]*1.6 && d[i+2] > d[i+1]*1.6) {
                points.push({x: (i/4) % canvas.width, y: Math.floor((i/4) / canvas.width)});
            }
        }

        if (points.length > 50) {
            const minX = Math.min(...points.map(p => p.x));
            const maxX = Math.max(...points.map(p => p.x));
            const minY = Math.min(...points.map(p => p.y));
            const maxY = Math.max(...points.map(p => p.y));
            const wPx = maxX - minX;
            const hPx = maxY - minY;

            // Отрисовка на холсте для снимка
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 6;
            ctx.strokeRect(minX, minY, wPx, hPx);
            
            ctx.fillStyle = "#0f0";
            ctx.font = "bold 45px monospace";
            const mmPerPx = 40 / wPx;
            const resultText = `40.00 x ${(hPx * mmPerPx).toFixed(2)} MM`;
            ctx.fillText(resultText, minX, minY - 20);
            
            // Дата и метка MI-AI
            ctx.font = "25px monospace";
            ctx.fillText(`MI-AI LOG: ${new Date().toLocaleString()}`, 30, canvas.height - 30);

            resVal.innerText = resultText;

            // Показываем результат как картинку (iOS friendly)
            previewImg.src = canvas.toDataURL('image/png');
            previewImg.style.display = 'block';
            document.getElementById('save-hint').style.display = 'block';
            document.getElementById('status').innerText = "ЗАМЕР ГОТОВ";
        } else {
            alert("Синий объект не найден. Проверьте освещение.");
        }
    }
</script>
</body>
</html>
