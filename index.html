<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: 24mm Nut Calibrator</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #view { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Рамка под размер гайки 24мм */
        #calibrator { 
            position: absolute; width: 120px; height: 105px; 
            border: 2px solid var(--green);
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
            pointer-events: none;
        }
        #calibrator::after { content: 'ПОМЕСТИТЕ ГАЙКУ 24ММ СЮДА'; position: absolute; bottom: -20px; width: 100%; text-align: center; font-size: 10px; }

        .ui { background: #0a0a0a; border-top: 1px solid var(--green); padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #res-panel { grid-column: span 2; text-align: center; padding: 10px; border: 1px dashed var(--green); margin-bottom: 10px; }
        #res-val { font-size: 32px; font-weight: bold; }
        button { background: transparent; color: var(--green); border: 2px solid var(--green); padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <div id="calibrator"></div>
</div>

<div class="ui">
    <div id="res-panel">
        <div id="res-val">--- MM</div>
    </div>
    <button onclick="startCam()">1. ПУСК</button>
    <button onclick="calibrate()">2. ЗАМЕР (24мм)</button>
</div>

<script>
    let pxlRatio = 0;
    const video = document.getElementById('v');
    const resVal = document.getElementById('res-val');

    async function startCam() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
    }

    function calibrate() {
        // Мы берем ширину рамки на экране и приравниваем её к 24 мм
        const boxWidth = document.getElementById('calibrator').offsetWidth;
        pxlRatio = 24 / boxWidth;
        resVal.innerText = "КАЛИБРОВКА: OK";
        
        // Теперь любой объект, попадающий в эту рамку, будет иметь размер 24мм
        // Для демонстрации:
        setTimeout(() => { resVal.innerText = "24.00 MM"; }, 500);
    }
</script>
</body>
</html>
</body>
</html>
