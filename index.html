<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI | ArUco измеритель (рабочий)</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <!-- Стабильная библиотека ArUco -->
    <script src="https://rawgit.com/nicolas-grekas/ArUco.js/master/aruco.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        #camera-container {
            flex: 1;
            position: relative;
            background: #111;
            overflow: hidden;
            touch-action: none;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        canvas {
            pointer-events: none;
        }
        .ui-panel {
            background: #0a0a0a;
            border-top: 2px solid #0f0;
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            padding: 12px;
            border-radius: 8px;
            text-transform: uppercase;
            cursor: pointer;
        }
        button:active {
            background: #0f0;
            color: #000;
        }
        .status {
            grid-column: span 2;
            font-size: 12px;
            text-align: center;
            padding: 6px;
            background: #001500;
            border: 1px solid #0f0;
            border-radius: 6px;
        }
        .result {
            grid-column: span 2;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .reset-btn {
            border-color: #f44;
            color: #f44;
        }
        .start-btn {
            background: #0f0;
            color: #000;
            border-color: #0f0;
        }
        .marker-guide {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="camera-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
    <div class="marker-guide" id="markerGuide">🎯 ArUco ID 0 (50x50 мм)</div>
</div>
<div class="ui-panel">
    <div class="status" id="statusMsg">⚠️ Нажмите «СТАРТ» для доступа к камере</div>
    <div class="result" id="distanceResult">--- mm</div>
    <button id="startBtn" class="start-btn" onclick="startCamera()">▶ СТАРТ</button>
    <button id="resetBtn" class="reset-btn" onclick="resetPoints()">СБРОС ТОЧЕК</button>
    <button id="saveBtn" onclick="saveSnapshot()">СОХРАНИТЬ ФОТО</button>
</div>

<script>
    // ----- НАСТРОЙКИ ЭТАЛОНА -----
    const MARKER_SIZE_MM = 50;   // реальный размер стороны маркера (мм)
    const MARKER_ID = 0;         // ID маркера (должен совпадать с распечатанным)

    // ----- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -----
    let video = document.getElementById('video');
    let overlay = document.getElementById('overlay');
    let ctx = overlay.getContext('2d');
    let stream = null;
    let points = [];
    let scaleMMperPX = null;
    let markerDetected = false;
    let cameraActive = false;
    let detector = null;

    const statusDiv = document.getElementById('statusMsg');
    const distanceDiv = document.getElementById('distanceResult');

    // ----- ИНИЦИАЛИЗАЦИЯ ArUco детектора -----
    function initAruco() {
        // Создаём словарь 4x4 (ID 0)
        detector = new AR.Detector({
            dictionary: "4x4",
            markerSize: MARKER_SIZE_MM
        });
        console.log("ArUco detector ready");
    }

    // ----- ЗАПУСК КАМЕРЫ (по кнопке) -----
    async function startCamera() {
        if (cameraActive) return;
        try {
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };
            statusDiv.innerText = "⏳ Запрос разрешения...";
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            cameraActive = true;
            statusDiv.innerText = "🟢 Камера активна. Ищем ArUco маркер...";
            requestAnimationFrame(processFrame);
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка доступа к камере: " + err.message;
            console.error(err);
        }
    }

    // ----- ОБРАБОТКА КАДРА -----
    function processFrame() {
        if (!cameraActive || !video.videoWidth) {
            requestAnimationFrame(processFrame);
            return;
        }

        if (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
        }

        ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
        const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);

        // Детекция маркеров
        let markers = [];
        if (detector) {
            markers = detector.detect(imageData);
        }

        let targetMarker = null;
        for (let m of markers) {
            if (m.id === MARKER_ID) {
                targetMarker = m;
                break;
            }
        }

        if (targetMarker) {
            markerDetected = true;
            const corners = targetMarker.corners; // массив из 4 точек {x, y}
            // Рисуем рамку
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
            ctx.closePath();
            ctx.stroke();

            // Вычисляем среднюю длину стороны в пикселях
            let sidePx = 0;
            for (let i = 0; i < corners.length; i++) {
                const p1 = corners[i];
                const p2 = corners[(i+1)%4];
                sidePx += Math.hypot(p1.x - p2.x, p1.y - p2.y);
            }
            sidePx /= 4;
            scaleMMperPX = MARKER_SIZE_MM / sidePx;
            statusDiv.innerText = "✅ Маркер найден. Тапните для замера.";
        } else {
            markerDetected = false;
            scaleMMperPX = null;
            statusDiv.innerText = "⚠️ Маркер не виден. Поместите ArUco в кадр.";
        }

        // Рисуем точки замера
        if (points.length > 0) {
            ctx.fillStyle = "#0f0";
            for (let i = 0; i < points.length; i++) {
                ctx.beginPath();
                ctx.arc(points[i].x, points[i].y, 8, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px monospace";
                ctx.fillText(i+1, points[i].x+12, points[i].y-8);
                ctx.fillStyle = "#0f0";
            }
            if (points.length === 2 && scaleMMperPX) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.strokeStyle = "#ff0";
                ctx.lineWidth = 4;
                ctx.stroke();
                const dist_px = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
                const dist_mm = dist_px * scaleMMperPX;
                distanceDiv.innerText = dist_mm.toFixed(1) + " mm";
            } else {
                distanceDiv.innerText = "--- mm";
            }
        } else {
            distanceDiv.innerText = "--- mm";
        }

        requestAnimationFrame(processFrame);
    }

    // ----- УСТАНОВКА ТОЧЕК (касания) -----
    function handleTouch(e) {
        if (!cameraActive) {
            statusDiv.innerText = "❌ Сначала нажмите «СТАРТ» и разрешите камеру.";
            return;
        }
        if (!markerDetected) {
            statusDiv.innerText = "❌ Сначала добейтесь обнаружения маркера!";
            return;
        }
        e.preventDefault();
        const rect = overlay.getBoundingClientRect();
        const scaleX = overlay.width / rect.width;
        const scaleY = overlay.height / rect.height;
        const touch = e.touches[0];
        const canvasX = (touch.clientX - rect.left) * scaleX;
        const canvasY = (touch.clientY - rect.top) * scaleY;

        if (points.length === 2) points = [];
        points.push({ x: canvasX, y: canvasY });
        if (points.length === 2) {
            statusDiv.innerText = "Замер выполнен. Нажмите «СБРОС ТОЧЕК» для нового.";
        } else {
            statusDiv.innerText = "Тапните вторую точку.";
        }
    }

    function resetPoints() {
        points = [];
        distanceDiv.innerText = "--- mm";
        statusDiv.innerText = "Точки сброшены. Можно замерять заново.";
    }

    function saveSnapshot() {
        if (!cameraActive || !overlay.width) {
            alert("Камера не активна");
            return;
        }
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = overlay.width;
        snapCanvas.height = overlay.height;
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(overlay, 0, 0);
        snapCtx.fillStyle = "#0f0";
        snapCtx.font = "20px monospace";
        snapCtx.fillText("MI-AI " + new Date().toLocaleString(), 20, 40);
        if (points.length === 2 && scaleMMperPX) {
            const dist = distanceDiv.innerText;
            snapCtx.fillStyle = "yellow";
            snapCtx.font = "bold 28px monospace";
            snapCtx.fillText(dist, 20, 90);
        }
        const dataUrl = snapCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <img src="${dataUrl}" style="max-width:100%;max-height:85vh;border:1px solid #0f0;">
                <p style="color:#0f0;font-family:monospace;margin-top:20px;text-align:center;">
                    📸 Зажмите фото → "Сохранить в фото"
                </p>
                <button onclick="window.close()" style="background:#0f0;color:#000;padding:10px;margin-top:10px;">Закрыть</button>
            </body>
        `);
    }

    // ----- ИНИЦИАЛИЗАЦИЯ -----
    function init() {
        initAruco();
        overlay.addEventListener('touchstart', handleTouch, { passive: false });
    }

    init();
</script>
</body>
</html>
