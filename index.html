<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI | Лёгкая авто-детекция</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; }
        #camera-container { flex: 1; position: relative; background: #111; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .ui-panel { background: #0a0a0a; border-top: 2px solid #0f0; padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; font-family: inherit; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        button:active { background: #0f0; color: #000; }
        .status { grid-column: span 2; font-size: 12px; text-align: center; padding: 6px; background: #001500; border: 1px solid #0f0; border-radius: 6px; }
        .result { grid-column: span 2; font-size: 24px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div id="camera-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
</div>
<div class="ui-panel">
    <div class="status" id="statusMsg">⚠️ Нажмите «СТАРТ»</div>
    <div class="result" id="distanceResult">--- mm</div>
    <button id="startBtn" style="background:#0f0;color:#000;" onclick="startCamera()">▶ СТАРТ</button>
    <button id="saveBtn" onclick="saveSnapshot()">СОХРАНИТЬ ФОТО</button>
</div>

<script>
    const QR_SIZE_MM = 46;
    let video = document.getElementById('video');
    let overlay = document.getElementById('overlay');
    let ctx = overlay.getContext('2d');
    let cameraActive = false;
    let animationId = null;
    let homography = null;
    let objectRect = null;          // {x, y, width, height} в оригинальных координатах

    const statusDiv = document.getElementById('statusMsg');
    const distanceDiv = document.getElementById('distanceResult');

    // ----- Гомография без внешних библиотек (DLT для 4 точек) -----
    function computeHomography(src, dst) {
        // src и dst – массивы из 4 точек {x, y}
        const A = [];
        for (let i = 0; i < 4; i++) {
            const [x, y] = [src[i].x, src[i].y];
            const [u, v] = [dst[i].x, dst[i].y];
            A.push([-x, -y, -1, 0, 0, 0, u*x, u*y, u]);
            A.push([0, 0, 0, -x, -y, -1, v*x, v*y, v]);
        }
        // Решаем Ah = 0 методом наименьших квадратов (через SVD, реализуем вручную)
        // Используем численный метод: находим собственный вектор с наименьшим собственным числом матрицы A^T A
        const AtA = numeric.multiply(numeric.transpose(A), A);
        const eigenvalues = numeric.eig(AtA);
        let minIdx = 0;
        for (let i = 1; i < eigenvalues.lambda.x.length; i++) {
            if (eigenvalues.lambda.x[i] < eigenvalues.lambda.x[minIdx]) minIdx = i;
        }
        const h = eigenvalues.E.x[minIdx]; // собственный вектор
        return [
            [h[0], h[1], h[2]],
            [h[3], h[4], h[5]],
            [h[6], h[7], h[8]]
        ];
    }

    // Вспомогательные функции для numeric (только то, что нужно)
    const numeric = {
        transpose: (A) => A[0].map((_, col) => A.map(row => row[col])),
        multiply: (A, B) => {
            const res = Array(A.length).fill().map(() => Array(B[0].length).fill(0));
            for (let i = 0; i < A.length; i++)
                for (let j = 0; j < B[0].length; j++)
                    for (let k = 0; k < B.length; k++)
                        res[i][j] += A[i][k] * B[k][j];
            return res;
        },
        eig: (A) => {
            // Упрощённо: используем метод Якоби для симметричной матрицы
            // Для 9x9 это приемлемо
            const n = A.length;
            let V = Array(n).fill().map((_, i) => Array(n).fill().map((_, j) => i === j ? 1 : 0));
            let d = A.map(row => [...row]);
            const eps = 1e-10;
            let iter = 0;
            while (iter < 100) {
                let maxOff = 0, p = 0, q = 0;
                for (let i = 0; i < n; i++)
                    for (let j = i+1; j < n; j++)
                        if (Math.abs(d[i][j]) > maxOff) { maxOff = Math.abs(d[i][j]); p = i; q = j; }
                if (maxOff < eps) break;
                const theta = (d[q][q] - d[p][p]) / (2 * d[p][q]);
                const t = Math.sign(theta) / (Math.abs(theta) + Math.sqrt(1 + theta*theta));
                const c = 1 / Math.sqrt(1 + t*t);
                const s = t * c;
                // Обновляем d и V
                for (let i = 0; i < n; i++) {
                    const dip = d[i][p];
                    const diq = d[i][q];
                    d[i][p] = c * dip - s * diq;
                    d[i][q] = s * dip + c * diq;
                }
                for (let i = 0; i < n; i++) {
                    const dpi = d[p][i];
                    const dqi = d[q][i];
                    d[p][i] = c * dpi - s * dqi;
                    d[q][i] = s * dpi + c * dqi;
                }
                for (let i = 0; i < n; i++) {
                    const vip = V[i][p];
                    const viq = V[i][q];
                    V[i][p] = c * vip - s * viq;
                    V[i][q] = s * vip + c * viq;
                }
                iter++;
            }
            const lambda = d.map((_, i) => d[i][i]);
            return { lambda: { x: lambda }, E: { x: V } };
        }
    };

    async function startCamera() {
        if (cameraActive) return;
        try {
            const constraints = {
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            };
            statusDiv.innerText = "⏳ Запрос...";
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            cameraActive = true;
            statusDiv.innerText = "🟢 Камера активна. Ищем QR...";
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(processFrame);
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка: " + err.message;
        }
    }

    // Детекция QR и гомография
    function detectQRAndHomography(imageData, width, height) {
        const code = jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
        if (!code) return null;
        const cornersPx = [
            code.location.topLeftCorner,
            code.location.topRightCorner,
            code.location.bottomRightCorner,
            code.location.bottomLeftCorner
        ];
        const realCorners = [
            {x: 0, y: 0},
            {x: QR_SIZE_MM, y: 0},
            {x: QR_SIZE_MM, y: QR_SIZE_MM},
            {x: 0, y: QR_SIZE_MM}
        ];
        const H = computeHomography(realCorners, cornersPx);
        return { cornersPx, homography: H };
    }

    // Применение гомографии к точке
    function applyHomography(H, x, y) {
        const z = H[2][0]*x + H[2][1]*y + H[2][2];
        const u = (H[0][0]*x + H[0][1]*y + H[0][2]) / z;
        const v = (H[1][0]*x + H[1][1]*y + H[1][2]) / z;
        return { x: u, y: v };
    }

    // Поиск объекта в центральной области (быстрый)
    function findCentralBlob(imageData, width, height, centerSize=300) {
        const cx = width / 2;
        const cy = height / 2;
        const half = centerSize / 2;
        const x0 = Math.max(0, cx - half);
        const y0 = Math.max(0, cy - half);
        const x1 = Math.min(width, cx + half);
        const y1 = Math.min(height, cy + half);
        const roiW = x1 - x0;
        const roiH = y1 - y0;
        if (roiW < 10 || roiH < 10) return null;

        // Вычисляем среднюю яркость в ROI
        let sumBright = 0;
        for (let y = y0; y < y1; y += 2) {
            for (let x = x0; x < x1; x += 2) {
                const idx = (y * width + x) * 4;
                const r = imageData.data[idx];
                const g = imageData.data[idx+1];
                const b = imageData.data[idx+2];
                const bright = 0.299 * r + 0.587 * g + 0.114 * b;
                sumBright += bright;
            }
        }
        const avgBright = sumBright / ((roiW/2)*(roiH/2));
        const threshold = avgBright * 0.85; // ищем объекты темнее фона (или светлее, можно параметр)

        // BFS только внутри ROI
        const visited = new Uint8Array(roiW * roiH);
        let bestArea = 0;
        let bestRect = null;
        for (let y = 0; y < roiH; y++) {
            for (let x = 0; x < roiW; x++) {
                const idx = ( (y0 + y) * width + (x0 + x) ) * 4;
                const r = imageData.data[idx];
                const g = imageData.data[idx+1];
                const b = imageData.data[idx+2];
                const bright = 0.299 * r + 0.587 * g + 0.114 * b;
                const isDark = bright < threshold;
                const vIdx = y * roiW + x;
                if (isDark && !visited[vIdx]) {
                    const queue = [{x, y}];
                    const points = [];
                    visited[vIdx] = 1;
                    while (queue.length) {
                        const p = queue.shift();
                        points.push(p);
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = p.x + dx;
                                const ny = p.y + dy;
                                if (nx >= 0 && nx < roiW && ny >= 0 && ny < roiH) {
                                    const nIdx = ( (y0 + ny) * width + (x0 + nx) ) * 4;
                                    const nr = imageData.data[nIdx];
                                    const ng = imageData.data[nIdx+1];
                                    const nb = imageData.data[nIdx+2];
                                    const nBright = 0.299 * nr + 0.587 * ng + 0.114 * nb;
                                    const nDark = nBright < threshold;
                                    const nvIdx = ny * roiW + nx;
                                    if (nDark && !visited[nvIdx]) {
                                        visited[nvIdx] = 1;
                                        queue.push({x: nx, y: ny});
                                    }
                                }
                            }
                        }
                    }
                    if (points.length > bestArea && points.length > 50) {
                        bestArea = points.length;
                        let minX = roiW, maxX = 0, minY = roiH, maxY = 0;
                        for (let p of points) {
                            minX = Math.min(minX, p.x);
                            maxX = Math.max(maxX, p.x);
                            minY = Math.min(minY, p.y);
                            maxY = Math.max(maxY, p.y);
                        }
                        bestRect = {
                            x: x0 + minX,
                            y: y0 + minY,
                            width: maxX - minX,
                            height: maxY - minY
                        };
                    }
                }
            }
        }
        return bestRect;
    }

    let frameSkip = 0;
    function processFrame() {
        if (!cameraActive || !video.videoWidth) {
            animationId = requestAnimationFrame(processFrame);
            return;
        }
        if (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
        const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);

        // QR и гомография
        const qr = detectQRAndHomography(imageData, overlay.width, overlay.height);
        if (qr) {
            homography = qr.homography;
            // Рисуем зелёную рамку QR
            const corners = qr.cornersPx;
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for (let i=1; i<corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
            ctx.closePath();
            ctx.stroke();
            statusDiv.innerText = "✅ QR найден. Ищем объект...";
        } else {
            homography = null;
            statusDiv.innerText = "⚠️ QR не виден.";
            animationId = requestAnimationFrame(processFrame);
            return;
        }

        // Поиск объекта (каждый 3-й кадр)
        frameSkip++;
        if (frameSkip >= 3) {
            frameSkip = 0;
            if (homography) {
                const rect = findCentralBlob(imageData, overlay.width, overlay.height, 400);
                if (rect && rect.width > 30 && rect.height > 30) {
                    // Исключаем область QR (проверяем пересечение)
                    const qrCenter = qr.cornersPx.reduce((s,p)=>s+p.x,0)/4;
                    const qrCenterY = qr.cornersPx.reduce((s,p)=>s+p.y,0)/4;
                    const rectCenterX = rect.x + rect.width/2;
                    const rectCenterY = rect.y + rect.height/2;
                    const distToQR = Math.hypot(rectCenterX - qrCenter, rectCenterY - qrCenterY);
                    if (distToQR > 80) {
                        objectRect = rect;
                        const real = getRectRealSize(rect, homography);
                        distanceDiv.innerText = `${real.width.toFixed(1)} x ${real.height.toFixed(1)} mm`;
                        statusDiv.innerText = "Объект найден. Нажмите Сохранить.";
                        ctx.strokeStyle = "#ff0";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                    } else {
                        objectRect = null;
                        distanceDiv.innerText = "--- mm";
                        statusDiv.innerText = "Объект слишком близко к QR.";
                    }
                } else {
                    objectRect = null;
                    distanceDiv.innerText = "--- mm";
                    statusDiv.innerText = "Объект не найден. Наведите на контрастный предмет.";
                }
            }
        } else if (objectRect) {
            // Перерисовка рамки
            ctx.strokeStyle = "#ff0";
            ctx.lineWidth = 4;
            ctx.strokeRect(objectRect.x, objectRect.y, objectRect.width, objectRect.height);
        }

        animationId = requestAnimationFrame(processFrame);
    }

    function getRectRealSize(rect, H) {
        const corners = [
            {x: rect.x, y: rect.y},
            {x: rect.x + rect.width, y: rect.y},
            {x: rect.x + rect.width, y: rect.y + rect.height},
            {x: rect.x, y: rect.y + rect.height}
        ];
        const transformed = corners.map(p => applyHomography(H, p.x, p.y));
        const width = Math.hypot(transformed[1].x - transformed[0].x, transformed[1].y - transformed[0].y);
        const height = Math.hypot(transformed[2].x - transformed[1].x, transformed[2].y - transformed[1].y);
        return { width, height };
    }

    function saveSnapshot() {
        if (!cameraActive || !overlay.width) {
            alert("Камера не активна");
            return;
        }
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = overlay.width;
        snapCanvas.height = overlay.height;
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(overlay, 0, 0);
        snapCtx.fillStyle = "#0f0";
        snapCtx.font = "20px monospace";
        snapCtx.fillText("MI-AI " + new Date().toLocaleString(), 20, 40);
        if (objectRect && homography) {
            const real = getRectRealSize(objectRect, homography);
            const sizeText = `${real.width.toFixed(1)} x ${real.height.toFixed(1)} mm`;
            snapCtx.fillStyle = "yellow";
            snapCtx.font = "bold 28px monospace";
            snapCtx.fillText(sizeText, 20, 90);
        }
        const dataUrl = snapCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <img src="${dataUrl}" style="max-width:100%;max-height:85vh;border:1px solid #0f0;">
                <p style="color:#0f0;font-family:monospace;margin-top:20px;text-align:center;">
                    📸 Зажмите фото → "Сохранить в фото"
                </p>
                <button onclick="window.close()" style="background:#0f0;color:#000;padding:10px;margin-top:10px;">Закрыть</button>
            </body>
        `);
    }
</script>
</body>
</html>
