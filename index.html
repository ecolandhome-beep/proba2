<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MASTER-INSPECT AI v0.2</title>
    <style>
        :root { 
            --green: #0f0; 
            --bg: #000;
            --ui-height: 190px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--green); 
            font-family: monospace; overflow: hidden; touch-action: none;
            height: 100dvh; 
        }
        #app { display: flex; flex-direction: column; height: 100%; padding-bottom: env(safe-area-inset-bottom); }
        #canvas-container { 
            flex: 1; position: relative; background: #111; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .ui { 
            height: var(--ui-height); background: #0a0a0a; border-top: 1px solid var(--green); 
            padding: 10px 15px; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto 1fr 1fr; gap: 10px; z-index: 100;
        }
        #display { grid-column: span 2; text-align: center; padding: 8px; border: 1px solid var(--green); background: #001500; }
        #status { font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
        #res-val { font-size: 22px; font-weight: bold; color: white; }
        button { 
            background: #000; color: var(--green); border: 1.5px solid var(--green); 
            font-weight: bold; font-family: inherit; font-size: 12px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; min-height: 50px; 
        }
        button:active { background: var(--green); color: #000; }
        button.reset { border-color: #f44; color: #f44; }
        #zoom-window { 
            position: absolute; top: 20px; right: 20px; width: 140px; height: 140px; 
            border: 2px solid var(--green); background: #000; display: none; 
            pointer-events: none; z-index: 1000; image-rendering: pixelated; 
            box-shadow: 0 0 20px rgba(0,255,0,0.4);
        }
        #zoom-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <video id="v" style="display:none;" playsinline autoplay></video>
        <canvas id="c"></canvas>
        <div id="zoom-window"><canvas id="zoom-canvas"></canvas></div>
    </div>
    <div class="ui">
        <div id="display">
            <div id="status">Система готова</div>
            <div id="res-val">---</div>
        </div>
        <button onclick="init()">1. КАМЕРА</button>
        <button onclick="capture()">2. ЗАХВАТ</button>
        <button class="reset" onclick="clearPoints()">ОЧИСТКА</button>
        <button onclick="saveResult()">СОХРАНИТЬ</button>
    </div>
</div>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', { alpha: false });
    const zoomWin = document.getElementById('zoom-window'), zc = document.getElementById('zoom-canvas'), zctx = zc.getContext('2d');
    const resVal = document.getElementById('res-val'), statusText = document.getElementById('status');
    
    let mmPerPx = 0, points = [], isCaptured = false, activePoint = null, baseImage = null;

    async function init() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            v.srcObject = s; 
            isCaptured = false; 
            points = [];
            statusText.innerText = "ПРЯМОЙ ЭФИР: ПОМЕСТИТЕ ЭТАЛОН";
            requestAnimationFrame(draw);
        } catch (e) { alert("Доступ к камере отклонен"); }
    }

    function draw() {
        if (!isCaptured) {
            if (v.videoWidth > 0) { 
                c.width = v.videoWidth; 
                c.height = v.videoHeight; 
                ctx.drawImage(v, 0, 0); 
            }
            requestAnimationFrame(draw);
        }
    }

    function capture() {
        isCaptured = true;
        baseImage = document.createElement('canvas');
        baseImage.width = c.width; 
        baseImage.height = c.height;
        baseImage.getContext('2d').drawImage(v, 0, 0);
        detectAnchor();
        renderFrame();
    }

    function detectAnchor() {
        const data = ctx.getImageData(0,0,c.width,c.height).data;
        let pts = [];
        // Сканируем на предмет синего ластика (эталон 40мм)
        for(let i=0; i<data.length; i+=64) {
            let r = data[i], g = data[i+1], b = data[i+2];
            if(b > 100 && b > r * 1.5 && b > g * 1.5) {
                pts.push({x:(i/4)%c.width, y:Math.floor((i/4)/c.width)});
            }
        }
        if(pts.length > 50) {
            const x1 = Math.min(...pts.map(p=>p.x)), x2 = Math.max(...pts.map(p=>p.x));
            mmPerPx = 40 / (x2 - x1);
            statusText.innerText = "МАСШТАБ УСТАНОВЛЕН. УКАЖИТЕ ТОЧКИ.";
        } else { 
            alert("Эталон не найден! Используйте синий предмет."); 
            isCaptured = false; 
            requestAnimationFrame(draw); 
        }
    }

    function renderFrame() {
        if (!baseImage) return;
        ctx.drawImage(baseImage, 0, 0);
        
        ctx.strokeStyle = '#0f0'; 
        ctx.lineWidth = Math.max(3, c.width/300); 
        ctx.fillStyle = '#0f0';
        ctx.font = `${Math.max(24, c.width/40)}px monospace`;

        points.forEach((p, i) => {
            ctx.beginPath(); 
            ctx.arc(p.x, p.y, ctx.lineWidth * 2.5, 0, 7); 
            ctx.stroke();
            ctx.fillText(i+1, p.x + 20, p.y - 20);
        });

        if(points.length === 2) {
            const d = Math.sqrt(Math.pow(points[1].x-points[0].x,2)+Math.pow(points[1].y-points[0].y,2));
            const res = (d * mmPerPx).toFixed(2);
            ctx.beginPath(); 
            ctx.moveTo(points[0].x, points[0].y); 
            ctx.lineTo(points[1].x, points[1].y); 
            ctx.stroke();
            resVal.innerText = res + " MM";
        }
    }

    function handleTouch(e) {
        if(!isCaptured) return;
        e.preventDefault();
        const rect = c.getBoundingClientRect();
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * (c.width/rect.width);
        const y = (touch.clientY - rect.top) * (c.height/rect.height);

        if(e.type === 'touchstart') {
            activePoint = points.find(p => Math.hypot(p.x-x, p.y-y) * (rect.width/c.width) < 40);
            if(!activePoint && points.length < 2) { 
                activePoint = {x, y}; 
                points.push(activePoint); 
            }
            zoomWin.style.display = 'block';
        }
        if(activePoint) { 
            activePoint.x = x; 
            activePoint.y = y; 
            updateZoom(x, y); 
            renderFrame(); 
        }
    }

    function updateZoom(x, y) {
        const size = 80; 
        zc.width = 160; zc.height = 160;
        zctx.imageSmoothingEnabled = false;
        zctx.drawImage(c, x - size/2, y - size/2, size, size, 0, 0, 160, 160);
        zctx.strokeStyle = 'red'; 
        zctx.lineWidth = 2;
        zctx.beginPath(); 
        zctx.moveTo(80, 60); zctx.lineTo(80, 100); 
        zctx.moveTo(60, 80); zctx.lineTo(100, 80); 
        zctx.stroke();
    }

    c.addEventListener('touchstart', handleTouch, {passive: false});
    c.addEventListener('touchmove', handleTouch, {passive: false});
    c.addEventListener('touchend', () => { zoomWin.style.display = 'none'; activePoint = null; });

    function clearPoints() { 
        points = []; 
        resVal.innerText = "---"; 
        renderFrame(); 
    }

    function saveResult() {
        if (points.length < 2) { alert("Сначала сделайте замер"); return; }
        
        const saveCanvas = document.createElement('canvas');
        saveCanvas.width = c.width; 
        saveCanvas.height = c.height;
        const sCtx = saveCanvas.getContext('2d');

        // 1. Рисуем чистое фото
        sCtx.drawImage(baseImage, 0, 0);

        // 2. Впекаем графику
        const lineW = Math.max(5, saveCanvas.width / 250);
        sCtx.strokeStyle = '#0f0'; 
        sCtx.lineWidth = lineW;
        sCtx.fillStyle = '#0f0';
        sCtx.font = `bold ${Math.max(30, saveCanvas.width / 35)}px monospace`;

        points.forEach((p, i) => {
            sCtx.beginPath(); 
            sCtx.arc(p.x, p.y, lineW * 2, 0, 7); 
            sCtx.fill();
            sCtx.fillText(i + 1, p.x + 25, p.y - 25);
        });

        sCtx.beginPath(); 
        sCtx.moveTo(points[0].x, points[0].y); 
        sCtx.lineTo(points[1].x, points[1].y); 
        sCtx.stroke();

        // 3. Плашка с результатом в углу
        const resText = resVal.innerText;
        const tw = sCtx.measureText(resText).width;
        sCtx.fillStyle = 'rgba(0,0,0,0.8)';
        sCtx.fillRect(20, 20, tw + 40, 80);
        sCtx.fillStyle = '#0f0';
        sCtx.fillText(resText, 40, 75);

        // 4. Открываем для ручного сохранения
        const dataUrl = saveCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <img src="${dataUrl}" style="max-width:100%;max-height:85vh;border:1px solid #0f0;">
                <p style="color:#0f0;font-family:monospace;margin-top:20px;text-align:center;padding:0 20px;">
                    ЗАЖМИТЕ ПАЛЕЦ НА ФОТО<br>И ВЫБЕРИТЕ "СОХРАНИТЬ В ФОТО"
                </p>
                <button onclick="window.close()" style="margin-top:20px;background:none;border:1px solid #0f0;color:#0f0;padding:10px 20px;">ВЕРНУТЬСЯ</button>
            </body>
        `);
    }
</script>
</body>
</html>
