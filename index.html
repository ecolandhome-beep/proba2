<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: 3D Edge Analysis</title>
    <script async src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.3/dist/opencv.js" onload="cvLoaded();"></script>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { 
            margin: 0; background: var(--bg); color: var(--green); 
            font-family: 'Courier New', monospace; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        #view { position: relative; flex: 1; overflow: hidden; background: #111; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui { 
            background: #0a0a0a; border-top: 1px solid var(--green); 
            padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 100;
        }
        #status { 
            position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 10px; 
            font-size: 10px; background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid var(--green); z-index: 110;
        }
        button { 
            background: transparent; color: var(--green); border: 2px solid var(--green);
            padding: 15px; font-family: inherit; font-weight: bold; text-transform: uppercase;
        }
        button:disabled { border-color: #333; color: #333; }
        #res-box { grid-column: span 2; text-align: center; border: 1px dashed var(--green); padding: 10px; font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="status">CV: ЗАГРУЗКА ЯДРА...</div>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <div id="res-box">--- MM</div>
    <button onclick="start()">1. ПУСК</button>
    <button id="btn-3d" onclick="toggle3D()" disabled>2. АВТО-РЕБРА</button>
</div>

<script>
    let video = document.getElementById('v');
    let canvas = document.getElementById('c');
    let ctx = canvas.getContext('2d');
    let is3D = false;
    let src, gray, edges, lines;

    function cvLoaded() {
        cv['onRuntimeInitialized'] = () => {
            document.getElementById('status').innerText = "CV: 3D ENGINE ACTIVE";
            document.getElementById('btn-3d').disabled = false;
        };
    }

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 640 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                // Инициализация матриц в памяти (без вывода на экран)
                src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                gray = new cv.Mat();
                edges = new cv.Mat();
                lines = new cv.Mat();
                document.getElementById('status').innerText = "SENSOR: ONLINE";
                render();
            };
        } catch (e) { alert("Ошибка камеры: " + e); }
    }

    function toggle3D() {
        is3D = !is3D;
        document.getElementById('status').innerText = is3D ? "MODE: 3D EDGE DETECT" : "MODE: DIRECT";
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (is3D && video.readyState === video.HAVE_ENOUGH_DATA) {
            try {
                let cap = new cv.VideoCapture(video);
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Детектор Кэнни для поиска границ
                cv.Canny(gray, edges, 50, 150);
                
                // Преобразование Хафа (HoughLinesP) для поиска именно ПРЯМЫХ (ребер)
                cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 40, 30, 10);
                
                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                
                for (let i = 0; i < lines.rows; ++i) {
                    let startX = lines.data32S[i * 4];
                    let startY = lines.data32S[i * 4 + 1];
                    let endX = lines.data32S[i * 4 + 2];
                    let endY = lines.data32S[i * 4 + 3];
                    
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            } catch (err) { console.error(err); }
        }
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
