<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI | Сбор датасета для 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; }
        #camera-container { flex: 1; position: relative; background: #111; overflow: hidden; touch-action: none; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        canvas { /* события включены */ }
        .ui-panel { background: #0a0a0a; border-top: 2px solid #0f0; padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; font-family: inherit; font-weight: bold; font-size: 12px; padding: 10px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        button:active { background: #0f0; color: #000; }
        .status { grid-column: span 2; font-size: 11px; text-align: center; padding: 4px; background: #001500; border: 1px solid #0f0; border-radius: 6px; }
        .result { grid-column: span 2; font-size: 20px; text-align: center; font-weight: bold; }
        .badge { display: inline-block; background: #0f0; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 12px; margin-left: 6px; }
        .reset-btn { border-color: #f44; color: #f44; }
        .save-btn { border-color: #ff0; color: #ff0; }
    </style>
</head>
<body>
<div id="camera-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
</div>
<div class="ui-panel">
    <div class="status" id="statusMsg">⚠️ Нажмите «СТАРТ»</div>
    <div class="result" id="distanceResult">--- mm</div>
    <button id="startBtn" style="background:#0f0;color:#000;" onclick="startCamera()">▶ СТАРТ</button>
    <button id="resetPointsBtn" class="reset-btn" onclick="resetPoints()">СБРОС ТОЧЕК</button>
    <button id="addFrameBtn" class="save-btn" onclick="addFrame()">📸 ДОБАВИТЬ КАДР</button>
    <button id="exportBtn" onclick="exportDataset()">📦 ЭКСПОРТ</button>
    <button id="clearFramesBtn" class="reset-btn" onclick="clearFrames()">🗑 ОЧИСТИТЬ КАДРЫ</button>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const QR_SIZE_MM = 46;   // реальный размер стороны QR-маркера (мм)

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let video = document.getElementById('video');
    let overlay = document.getElementById('overlay');
    let ctx = overlay.getContext('2d');
    let stream = null;
    let points = [];               // точки замера (0,1 или 2)
    let scaleMMperPX = null;      // мм/пиксель
    let markerDetected = false;
    let cameraActive = false;
    let animationId = null;
    let frames = [];               // массив сохранённых canvas (DataURL)

    const statusDiv = document.getElementById('statusMsg');
    const distanceDiv = document.getElementById('distanceResult');
    const addFrameBtn = document.getElementById('addFrameBtn');

    // ========== КАМЕРА ==========
    async function startCamera() {
        if (cameraActive) return;
        try {
            const constraints = {
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            };
            statusDiv.innerText = "⏳ Запрос...";
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            cameraActive = true;
            statusDiv.innerText = "🟢 Камера активна. Ищем QR...";
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(processFrame);
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка: " + err.message;
        }
    }

    // ========== ДЕТЕКЦИЯ QR И РИСОВАНИЕ ==========
    function processFrame() {
        if (!cameraActive || !video.videoWidth) {
            animationId = requestAnimationFrame(processFrame);
            return;
        }
        if (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
        const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);
        const code = jsQR(imageData.data, overlay.width, overlay.height, { inversionAttempts: "dontInvert" });

        if (code) {
            markerDetected = true;
            const corners = [
                code.location.topLeftCorner,
                code.location.topRightCorner,
                code.location.bottomRightCorner,
                code.location.bottomLeftCorner
            ];
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
            ctx.closePath();
            ctx.stroke();

            // Вычисление масштаба
            let sidePx = 0;
            for (let i = 0; i < corners.length; i++) {
                const p1 = corners[i];
                const p2 = corners[(i+1)%4];
                sidePx += Math.hypot(p1.x - p2.x, p1.y - p2.y);
            }
            sidePx /= 4;
            scaleMMperPX = QR_SIZE_MM / sidePx;
            statusDiv.innerText = "✅ QR найден. Тапните для замера.";
        } else {
            markerDetected = false;
            scaleMMperPX = null;
            statusDiv.innerText = "⚠️ QR не виден.";
        }

        // Отрисовка точек замера
        if (points.length > 0) {
            ctx.fillStyle = "#0f0";
            for (let i = 0; i < points.length; i++) {
                ctx.beginPath();
                ctx.arc(points[i].x, points[i].y, 8, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px monospace";
                ctx.fillText(i+1, points[i].x+12, points[i].y-8);
                ctx.fillStyle = "#0f0";
            }
            if (points.length === 2 && scaleMMperPX) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.strokeStyle = "#ff0";
                ctx.lineWidth = 4;
                ctx.stroke();
                const dist_px = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
                const dist_mm = dist_px * scaleMMperPX;
                distanceDiv.innerText = dist_mm.toFixed(1) + " mm";
            } else {
                distanceDiv.innerText = "--- mm";
            }
        } else {
            distanceDiv.innerText = "--- mm";
        }
        animationId = requestAnimationFrame(processFrame);
    }

    // ========== УСТАНОВКА ТОЧЕК (касания) ==========
    function handleTouch(e) {
        if (!cameraActive) {
            statusDiv.innerText = "❌ Сначала СТАРТ";
            return;
        }
        if (!markerDetected) {
            statusDiv.innerText = "❌ QR не обнаружен";
            return;
        }
        e.preventDefault();
        const rect = overlay.getBoundingClientRect();
        const scaleX = overlay.width / rect.width;
        const scaleY = overlay.height / rect.height;
        const touch = e.touches[0];
        const canvasX = (touch.clientX - rect.left) * scaleX;
        const canvasY = (touch.clientY - rect.top) * scaleY;

        if (points.length === 2) {
            // Если уже две точки, не добавляем новые (пользователь должен нажать «СБРОС ТОЧЕК»)
            statusDiv.innerText = "Две точки уже есть. Нажмите СБРОС.";
            return;
        }
        points.push({ x: canvasX, y: canvasY });
        if (points.length === 2) {
            statusDiv.innerText = "Замер готов. Добавьте кадр или сбросьте точки.";
        } else {
            statusDiv.innerText = "Тапните вторую точку.";
        }
    }

    function resetPoints() {
        points = [];
        distanceDiv.innerText = "--- mm";
        statusDiv.innerText = "Точки сброшены.";
    }

    // ========== УПРАВЛЕНИЕ ДАТАСЕТОМ ==========
    function addFrame() {
        if (!cameraActive) {
            alert("Камера не активна");
            return;
        }
        if (points.length !== 2) {
            alert("Сначала сделайте замер (две точки)");
            return;
        }
        if (!scaleMMperPX) {
            alert("QR-маркер не обнаружен");
            return;
        }
        // Сохраняем текущий canvas как PNG
        const dataUrl = overlay.toDataURL('image/png');
        frames.push(dataUrl);
        updateFrameCounter();
        statusDiv.innerText = `Кадр ${frames.length} сохранён. Сделайте следующий ракурс.`;
        // Автоматически сбрасываем точки для следующего замера
        resetPoints();
    }

    function clearFrames() {
        frames = [];
        updateFrameCounter();
        statusDiv.innerText = "Все кадры удалены.";
    }

    function updateFrameCounter() {
        let badge = document.getElementById('frameCounter');
        if (!badge) {
            badge = document.createElement('span');
            badge.id = 'frameCounter';
            badge.className = 'badge';
            addFrameBtn.appendChild(badge);
        }
        badge.innerText = frames.length;
    }

    // ========== ЭКСПОРТ В ZIP ==========
    async function exportDataset() {
        if (frames.length === 0) {
            alert("Нет сохранённых кадров.");
            return;
        }
        if (!scaleMMperPX) {
            alert("Масштаб не определён (QR не виден)");
            return;
        }
        const zip = new JSZip();
        const folder = zip.folder("MI_AI_dataset");

        // Добавляем JSON с метаданными
        const metadata = {
            timestamp: new Date().toISOString(),
            qr_size_mm: QR_SIZE_MM,
            scale_mm_per_px: scaleMMperPX,
            frames_count: frames.length,
            device: navigator.userAgent
        };
        folder.file("metadata.json", JSON.stringify(metadata, null, 2));

        // Добавляем каждый кадр
        for (let i = 0; i < frames.length; i++) {
            const base64 = frames[i].split(',')[1];
            folder.file(`frame_${String(i+1).padStart(3,'0')}.png`, base64, { base64: true });
        }

        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `MI_AI_dataset_${Date.now()}.zip`;
        link.click();
        URL.revokeObjectURL(link.href);
        statusDiv.innerText = `Экспортировано ${frames.length} кадров.`;
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    overlay.addEventListener('touchstart', handleTouch, { passive: false });
    window.addEventListener('touchmove', function(e) { if (e.target === overlay) e.preventDefault(); }, { passive: false });
    // кнопки уже имеют onclick
    updateFrameCounter();
</script>
</body>
</html>
