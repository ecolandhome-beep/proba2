<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI | Авто-детекция (лёгкая)</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; }
        #camera-container { flex: 1; position: relative; background: #111; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .ui-panel { background: #0a0a0a; border-top: 2px solid #0f0; padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; font-family: inherit; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        button:active { background: #0f0; color: #000; }
        .status { grid-column: span 2; font-size: 12px; text-align: center; padding: 6px; background: #001500; border: 1px solid #0f0; border-radius: 6px; }
        .result { grid-column: span 2; font-size: 24px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div id="camera-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
</div>
<div class="ui-panel">
    <div class="status" id="statusMsg">⚠️ Нажмите «СТАРТ»</div>
    <div class="result" id="distanceResult">--- mm</div>
    <button id="startBtn" style="background:#0f0;color:#000;" onclick="startCamera()">▶ СТАРТ</button>
    <button id="saveBtn" onclick="saveSnapshot()">СОХРАНИТЬ ФОТО</button>
</div>

<script>
    const QR_SIZE_MM = 46;
    let video = document.getElementById('video');
    let overlay = document.getElementById('overlay');
    let ctx = overlay.getContext('2d');
    let cameraActive = false;
    let animationId = null;
    let qrDetected = false;
    let homography = null;
    let objectRect = null;   // {x, y, width, height} в пикселях (оригинальные координаты)

    const statusDiv = document.getElementById('statusMsg');
    const distanceDiv = document.getElementById('distanceResult');

    // Утилита для вычисления гомографии (DLT, требуется numeric.js)
    // Подключаем numeric через CDN
    function loadNumeric() {
        return new Promise((resolve) => {
            if (window.numeric) { resolve(); return; }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js';
            script.onload = resolve;
            document.head.appendChild(script);
        });
    }

    async function startCamera() {
        if (cameraActive) return;
        await loadNumeric();
        try {
            const constraints = { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false };
            statusDiv.innerText = "⏳ Запрос...";
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            cameraActive = true;
            statusDiv.innerText = "🟢 Камера активна. Ищем QR...";
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(processFrame);
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка: " + err.message;
        }
    }

    // Детекция QR и гомография
    function detectQRAndHomography(imageData, width, height) {
        const code = jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
        if (!code) return null;
        const cornersPx = [
            code.location.topLeftCorner,
            code.location.topRightCorner,
            code.location.bottomRightCorner,
            code.location.bottomLeftCorner
        ];
        const realCorners = [
            {x: 0, y: 0},
            {x: QR_SIZE_MM, y: 0},
            {x: QR_SIZE_MM, y: QR_SIZE_MM},
            {x: 0, y: QR_SIZE_MM}
        ];
        // Вычисляем гомографию через numeric.svd
        const A = [];
        for (let i = 0; i < 4; i++) {
            const [x, y] = [realCorners[i].x, realCorners[i].y];
            const [u, v] = [cornersPx[i].x, cornersPx[i].y];
            A.push([-x, -y, -1, 0, 0, 0, u*x, u*y, u]);
            A.push([0, 0, 0, -x, -y, -1, v*x, v*y, v]);
        }
        const svd = numeric.svd(A);
        const H = svd.V.slice(-1)[0];
        const homography = [
            [H[0], H[1], H[2]],
            [H[3], H[4], H[5]],
            [H[6], H[7], H[8]]
        ];
        return { cornersPx, homography };
    }

    // Лёгкий поиск объекта: бинаризация по яркости + поиск самого большого связного компонента (BFS)
    // Работаем на уменьшенном изображении (scale=0.5) для скорости.
    function findLargestBlob(imageData, width, height, scale=0.5) {
        const smallW = Math.floor(width * scale);
        const smallH = Math.floor(height * scale);
        // Уменьшаем изображение (простая выборка каждого 2-го пикселя)
        const smallData = new Uint8ClampedArray(smallW * smallH);
        for (let y = 0; y < smallH; y++) {
            for (let x = 0; x < smallW; x++) {
                const srcX = Math.floor(x / scale);
                const srcY = Math.floor(y / scale);
                const idx = (srcY * width + srcX) * 4;
                const r = imageData.data[idx];
                const g = imageData.data[idx+1];
                const b = imageData.data[idx+2];
                const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                smallData[y * smallW + x] = brightness;
            }
        }
        // Бинаризация по порогу (адаптивный: средняя яркость)
        let sum = 0;
        for (let i = 0; i < smallData.length; i++) sum += smallData[i];
        const threshold = sum / smallData.length;
        const binary = new Uint8Array(smallW * smallH);
        for (let i = 0; i < smallData.length; i++) binary[i] = smallData[i] < threshold ? 255 : 0;
        // BFS для поиска компонентов
        const visited = new Uint8Array(smallW * smallH);
        let bestArea = 0;
        let bestRect = null;
        for (let y = 0; y < smallH; y++) {
            for (let x = 0; x < smallW; x++) {
                const idx = y * smallW + x;
                if (binary[idx] === 255 && !visited[idx]) {
                    const queue = [{x, y}];
                    const points = [];
                    visited[idx] = 1;
                    while (queue.length) {
                        const p = queue.shift();
                        points.push(p);
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = p.x + dx, ny = p.y + dy;
                                if (nx >= 0 && nx < smallW && ny >= 0 && ny < smallH) {
                                    const nidx = ny * smallW + nx;
                                    if (binary[nidx] === 255 && !visited[nidx]) {
                                        visited[nidx] = 1;
                                        queue.push({x: nx, y: ny});
                                    }
                                }
                            }
                        }
                    }
                    if (points.length > bestArea && points.length > 100) {
                        bestArea = points.length;
                        let minX = smallW, maxX = 0, minY = smallH, maxY = 0;
                        for (let p of points) {
                            minX = Math.min(minX, p.x);
                            maxX = Math.max(maxX, p.x);
                            minY = Math.min(minY, p.y);
                            maxY = Math.max(maxY, p.y);
                        }
                        bestRect = { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
                    }
                }
            }
        }
        if (bestRect) {
            // Масштабируем обратно
            return {
                x: bestRect.x / scale,
                y: bestRect.y / scale,
                width: bestRect.width / scale,
                height: bestRect.height / scale
            };
        }
        return null;
    }

    // Применение гомографии к углам прямоугольника -> вычисление длины и ширины в мм
    function getRectRealSize(rect, homography) {
        // Углы прямоугольника (повёрнутого нет, используем axis-aligned для простоты)
        const corners = [
            {x: rect.x, y: rect.y},
            {x: rect.x + rect.width, y: rect.y},
            {x: rect.x + rect.width, y: rect.y + rect.height},
            {x: rect.x, y: rect.y + rect.height}
        ];
        const transformed = corners.map(p => applyHomography(homography, p.x, p.y));
        const widthReal = Math.hypot(transformed[1].x - transformed[0].x, transformed[1].y - transformed[0].y);
        const heightReal = Math.hypot(transformed[2].x - transformed[1].x, transformed[2].y - transformed[1].y);
        return { width: widthReal, height: heightReal };
    }

    function applyHomography(H, x, y) {
        const z = H[2][0]*x + H[2][1]*y + H[2][2];
        const u = (H[0][0]*x + H[0][1]*y + H[0][2]) / z;
        const v = (H[1][0]*x + H[1][1]*y + H[1][2]) / z;
        return { x: u, y: v };
    }

    let frameSkip = 0;
    function processFrame() {
        if (!cameraActive || !video.videoWidth) {
            animationId = requestAnimationFrame(processFrame);
            return;
        }
        if (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
        const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);

        // 1. QR и гомография (каждый кадр, это быстро)
        const qr = detectQRAndHomography(imageData, overlay.width, overlay.height);
        if (qr) {
            qrDetected = true;
            homography = qr.homography;
            // Рисуем зелёную рамку QR (по углам)
            const corners = qr.cornersPx;
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for (let i=1; i<corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
            ctx.closePath();
            ctx.stroke();
            statusDiv.innerText = "✅ QR найден. Ищем объект...";
        } else {
            qrDetected = false;
            homography = null;
            statusDiv.innerText = "⚠️ QR не виден.";
            animationId = requestAnimationFrame(processFrame);
            return;
        }

        // 2. Поиск объекта (каждый 5-й кадр, на уменьшенном изображении)
        frameSkip++;
        if (frameSkip >= 5) {
            frameSkip = 0;
            const rect = findLargestBlob(imageData, overlay.width, overlay.height, 0.5);
            if (rect && homography) {
                // Исключаем область QR (приблизительно)
                const qrCenterX = qr.cornersPx.reduce((s,p)=>s+p.x,0)/4;
                const qrCenterY = qr.cornersPx.reduce((s,p)=>s+p.y,0)/4;
                const rectCenterX = rect.x + rect.width/2;
                const rectCenterY = rect.y + rect.height/2;
                const distToQR = Math.hypot(rectCenterX - qrCenterX, rectCenterY - qrCenterY);
                if (distToQR > 100 && rect.width > 30 && rect.height > 30) {
                    objectRect = rect;
                    const real = getRectRealSize(rect, homography);
                    distanceDiv.innerText = `${real.width.toFixed(1)} x ${real.height.toFixed(1)} mm`;
                    statusDiv.innerText = "Объект найден. Нажмите Сохранить.";
                    // Рисуем жёлтую рамку
                    ctx.strokeStyle = "#ff0";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                } else {
                    objectRect = null;
                    distanceDiv.innerText = "--- mm";
                    statusDiv.innerText = "Объект не найден (слишком близко к QR или мал).";
                }
            } else {
                objectRect = null;
                distanceDiv.innerText = "--- mm";
                statusDiv.innerText = "Объект не найден. Наведите на контрастный предмет.";
            }
        } else if (objectRect) {
            // Просто перерисовываем рамку
            ctx.strokeStyle = "#ff0";
            ctx.lineWidth = 4;
            ctx.strokeRect(objectRect.x, objectRect.y, objectRect.width, objectRect.height);
        }

        animationId = requestAnimationFrame(processFrame);
    }

    function saveSnapshot() {
        if (!cameraActive || !overlay.width) {
            alert("Камера не активна");
            return;
        }
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = overlay.width;
        snapCanvas.height = overlay.height;
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(overlay, 0, 0);
        snapCtx.fillStyle = "#0f0";
        snapCtx.font = "20px monospace";
        snapCtx.fillText("MI-AI " + new Date().toLocaleString(), 20, 40);
        if (objectRect && homography) {
            const real = getRectRealSize(objectRect, homography);
            const sizeText = `${real.width.toFixed(1)} x ${real.height.toFixed(1)} mm`;
            snapCtx.fillStyle = "yellow";
            snapCtx.font = "bold 28px monospace";
            snapCtx.fillText(sizeText, 20, 90);
        }
        const dataUrl = snapCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <img src="${dataUrl}" style="max-width:100%;max-height:85vh;border:1px solid #0f0;">
                <p style="color:#0f0;font-family:monospace;margin-top:20px;text-align:center;">
                    📸 Зажмите фото → "Сохранить в фото"
                </p>
                <button onclick="window.close()" style="background:#0f0;color:#000;padding:10px;margin-top:10px;">Закрыть</button>
            </body>
        `);
    }
</script>
</body>
</html>
