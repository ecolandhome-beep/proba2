<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MI-AI: Precision Touch</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; touch-action: none; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background: #111; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #000; }
        #info { grid-column: span 2; border: 1px solid var(--green); padding: 10px; text-align: center; font-size: 16px; }
        button { background: #000; color: var(--green); border: 2px solid var(--green); padding: 15px; font-weight: bold; }
        #save-hint { font-size: 10px; color: #888; grid-column: span 2; text-align: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <video id="v" style="display:none;" playsinline autoplay></video>
        <canvas id="c"></canvas>
    </div>

    <div class="controls">
        <div id="info">НАЖМИТЕ "СТАРТ" И СДЕЛАЙТЕ ЗАХВАТ</div>
        <button onclick="startCam()">1. СТАРТ</button>
        <button onclick="capture()">2. ЗАХВАТ</button>
        <div id="save-hint">После замера: зажмите экран для сохранения результата</div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const info = document.getElementById('info');

    let mmPerPx = 0;
    let points = [];
    let isCaptured = false;
    let baseImg = null;

    async function startCam() {
        const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: 1280}});
        v.srcObject = stream;
        requestAnimationFrame(drawPreview);
    }

    function drawPreview() {
        if (!isCaptured) {
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            requestAnimationFrame(drawPreview);
        }
    }

    function capture() {
        isCaptured = true;
        ctx.drawImage(v, 0, 0);
        baseImg = ctx.getImageData(0, 0, c.width, c.height);
        
        // Автоматический поиск эталона (синий ластик 40мм)
        let pixels = baseImg.data;
        let bluePts = [];
        for (let i = 0; i < pixels.length; i += 16) {
            if (pixels[i+2] > 130 && pixels[i+2] > pixels[i]*1.8) {
                bluePts.push({x: (i/4)%c.width, y: Math.floor((i/4)/c.width)});
            }
        }

        if (bluePts.length > 50) {
            const x1 = Math.min(...bluePts.map(p => p.x)), x2 = Math.max(...bluePts.map(p => p.x));
            const w = x2 - x1;
            mmPerPx = 40 / w; // Эталон 40мм
            
            ctx.strokeStyle = '#0f0'; ctx.lineWidth = 4;
            ctx.strokeRect(x1, Math.min(...bluePts.map(p => p.y)), w, Math.max(...bluePts.map(p => p.y)) - Math.min(...bluePts.map(p => p.y)));
            info.innerHTML = `МАСШТАБ УСТАНОВЛЕН<br>Ткните в две точки для замера`;
        } else {
            alert("Синий эталон не найден! Попробуйте еще раз.");
            isCaptured = false;
            requestAnimationFrame(drawPreview);
        }
    }

    c.addEventListener('touchstart', (e) => {
        if (!isCaptured || mmPerPx === 0) return;
        
        const rect = c.getBoundingClientRect();
        const scaleX = c.width / rect.width;
        const scaleY = c.height / rect.height;
        const x = (e.touches[0].clientX - rect.left) * scaleX;
        const y = (e.touches[0].clientY - rect.top) * scaleY;

        points.push({x, y});

        // Рисуем точку
        ctx.fillStyle = '#0f0';
        ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();

        if (points.length === 2) {
            const distPx = Math.sqrt(Math.pow(points[2].x - points[0].x, 2) + Math.pow(points[1].y - points[0].y, 2));
            const distMm = (distPx * mmPerPx).toFixed(2);
            
            // Рисуем линию замера
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.stroke();

            // Пишем результат
            ctx.font = "bold 40px Arial";
            ctx.fillStyle = "white";
            ctx.fillText(`${distMm} mm`, (points[0].x + points[1].x)/2, (points[0].y + points[1].y)/2 - 20);
            
            info.innerHTML = `РЕЗУЛЬТАТ: <span style="color:white; font-size:24px;">${distMm} мм</span>`;
            points = []; // Сброс для следующего замера
        }
    });
</script>
</body>
</html>
