<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: Real-Time Analyzer</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #view { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; z-index: 5; pointer-events: none; }
        
        /* Визуальный прицел */
        #target-box { 
            position: absolute; width: 150px; height: 150px; 
            border: 1px dashed rgba(0,255,0,0.5); z-index: 10;
        }

        .ui { background: #0a0a0a; border-top: 1px solid var(--green); padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 100;}
        #res-panel { grid-column: span 2; text-align: center; padding: 10px; border: 1px solid var(--green); background: #111; }
        #res-val { font-size: 28px; font-weight: bold; color: var(--green); }
        button { background: #000; color: var(--green); border: 2px solid var(--green); padding: 15px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <div id="target-box"></div>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <div id="res-panel">
        <div id="status">ОЖИДАНИЕ ОБЪЕКТА...</div>
        <div id="res-val">---</div>
    </div>
    <button onclick="startCam()">1. КАМЕРА</button>
    <button onclick="measure()">2. АНАЛИЗ</button>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const resVal = document.getElementById('res-val');
    const status = document.getElementById('status');

    async function startCam() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: 640 } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };
    }

    function measure() {
        // Отрисовываем текущий кадр на невидимый холст
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Берем центр кадра (ROI)
        const size = 150;
        const x = (canvas.width - size) / 2;
        const y = (canvas.height - size) / 2;
        const imgData = ctx.getImageData(x, y, size, size);
        const data = imgData.data;

        let left = size, right = 0;

        // Ищем самый левый и самый правый светлый пиксель (гайку)
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            if (brightness > 120) { // Порог яркости для металла
                const pxIdx = (i / 4) % size;
                if (pxIdx < left) left = pxIdx;
                if (pxIdx > right) right = pxIdx;
            }
        }

        const detectedWidthPxl = right - left;

        if (detectedWidthPxl > 10) {
            // Если мы договорились, что гайка = 24мм, а она заняла detectedWidthPxl
            // То в этом масштабе монета (которая меньше) покажет меньшее число
            const currentScale = 24 / 130; // 130 - это условный размер гайки в рамке
            const finalSize = detectedWidthPxl * currentScale;
            
            status.innerText = "ОБЪЕКТ ОБНАРУЖЕН";
            resVal.innerText = finalSize.toFixed(2) + " MM";
        } else {
            status.innerText = "ПУСТО В РАМКЕ";
            resVal.innerText = "---";
        }
    }
</script>
</body>
</html>
