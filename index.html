<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI | Автоизмеритель прямоугольников</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; }
        #camera-container { flex: 1; position: relative; background: #111; overflow: hidden; touch-action: none; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        canvas { pointer-events: auto; }  /* для тапов */
        .ui-panel { background: #0a0a0a; border-top: 2px solid #0f0; padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; font-family: inherit; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        button:active { background: #0f0; color: #000; }
        .status { grid-column: span 2; font-size: 12px; text-align: center; padding: 6px; background: #001500; border: 1px solid #0f0; border-radius: 6px; }
        .result { grid-column: span 2; font-size: 20px; text-align: center; font-weight: bold; }
        .reset-btn { border-color: #f44; color: #f44; }
    </style>
</head>
<body>
<div id="camera-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
</div>
<div class="ui-panel">
    <div class="status" id="statusMsg">⚠️ Нажмите «СТАРТ»</div>
    <div class="result" id="distanceResult">--- mm</div>
    <button id="startBtn" style="background:#0f0;color:#000;" onclick="startCamera()">▶ СТАРТ</button>
    <button id="saveBtn" onclick="saveSnapshot()">СОХРАНИТЬ ФОТО</button>
</div>

<script>
    // РЕАЛЬНЫЙ РАЗМЕР QR-МАРКЕРА (сторона в мм)
    const QR_SIZE_MM = 46;   // измените под вашу распечатку

    let video = document.getElementById('video');
    let overlay = document.getElementById('overlay');
    let ctx = overlay.getContext('2d');
    let stream = null;
    let cameraActive = false;
    let animationId = null;

    // Данные QR
    let qrDetected = false;
    let qrCorners = null;     // массив из 4 точек {x, y}
    let scaleMMperPX = null;   // мм/пиксель (вычисляется по QR)

    // Данные выбранного объекта
    let selectedContour = null;   // массив точек (4 угла) в пикселях
    let objectWidth = 0, objectHeight = 0; // в мм

    const statusDiv = document.getElementById('statusMsg');
    const distanceDiv = document.getElementById('distanceResult');

    // ========== КАМЕРА ==========
    async function startCamera() {
        if (cameraActive) return;
        try {
            const constraints = {
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            };
            statusDiv.innerText = "⏳ Запрос...";
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            cameraActive = true;
            statusDiv.innerText = "🟢 Камера активна. Ищем QR...";
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(processFrame);
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка: " + err.message;
        }
    }

    // ========== ДЕТЕКЦИЯ QR ==========
    function detectQR(imageData, width, height) {
        const code = jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
        if (!code) return null;
        const corners = [
            code.location.topLeftCorner,
            code.location.topRightCorner,
            code.location.bottomRightCorner,
            code.location.bottomLeftCorner
        ];
        // Вычисляем среднюю длину стороны в пикселях
        let sidePx = 0;
        for (let i = 0; i < corners.length; i++) {
            const p1 = corners[i];
            const p2 = corners[(i+1)%4];
            sidePx += Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }
        sidePx /= 4;
        const mmPerPx = QR_SIZE_MM / sidePx;
        return { corners, mmPerPx };
    }

    // ========== ПОИСК ПРЯМОУГОЛЬНЫХ КОНТУРОВ (исключая зону QR) ==========
    function findRectangularContours(imageData, width, height, qrCorners) {
        // Преобразуем в серый для Canny
        const gray = new Uint8ClampedArray(width * height);
        for (let i = 0; i < imageData.data.length; i += 4) {
            const r = imageData.data[i];
            const g = imageData.data[i+1];
            const b = imageData.data[i+2];
            gray[i/4] = 0.299 * r + 0.587 * g + 0.114 * b;
        }

        // Простой детектор границ (Canny-like) — для производительности используем приближение
        // В браузере нет встроенного Canny, поэтому используем размытие и поиск градиента.
        // Упрощённо: возьмём разность по соседним пикселям.
        const edges = new Uint8ClampedArray(width * height);
        for (let y = 1; y < height-1; y++) {
            for (let x = 1; x < width-1; x++) {
                const idx = y * width + x;
                const gx = gray[idx+1] - gray[idx-1];
                const gy = gray[idx+width] - gray[idx-width];
                const mag = Math.hypot(gx, gy);
                edges[idx] = mag > 30 ? 255 : 0;
            }
        }

        // Поиск контуров (простой алгоритм траверса — для демо используем библиотеку? Нет, напишем упрощённо)
        // В реальном коде лучше использовать OpenCV.js, но мы от него отказались.
        // Вместо этого: найдём все связные области (blob) и аппроксимируем их прямоугольником.
        // Но это сложно. Предлагаю вернуться к цветовой сегментации для MVP.
        // Однако для прямоугольных объектов на контрастном фоне можно найти bounding box по порогу яркости.
        // Давайте сделаем так: ищем самый большой связный компонент по порогу (объект ярче фона).
        const visited = new Uint8Array(width * height);
        const contours = [];

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                if (edges[idx] && !visited[idx]) {
                    // Заполняем контур (BFS)
                    const queue = [{x, y}];
                    const points = [];
                    visited[idx] = 1;
                    while (queue.length) {
                        const p = queue.shift();
                        points.push(p);
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = p.x + dx, ny = p.y + dy;
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const nidx = ny * width + nx;
                                    if (edges[nidx] && !visited[nidx]) {
                                        visited[nidx] = 1;
                                        queue.push({x: nx, y: ny});
                                    }
                                }
                            }
                        }
                    }
                    if (points.length > 100) {
                        // Аппроксимируем bounding box
                        let minX = width, maxX = 0, minY = height, maxY = 0;
                        for (let p of points) {
                            minX = Math.min(minX, p.x);
                            maxX = Math.max(maxX, p.x);
                            minY = Math.min(minY, p.y);
                            maxY = Math.max(maxY, p.y);
                        }
                        const rect = { x: minX, y: minY, width: maxX-minX, height: maxY-minY };
                        contours.push({ points, rect });
                    }
                }
            }
        }

        // Сортируем по площади
        contours.sort((a,b) => (b.rect.width*b.rect.height) - (a.rect.width*a.rect.height));
        if (contours.length === 0) return null;

        // Выбираем первый, который не пересекается с QR
        for (let c of contours) {
            if (qrCorners) {
                // Проверяем, не находится ли центр прямоугольника внутри QR
                const centerX = c.rect.x + c.rect.width/2;
                const centerY = c.rect.y + c.rect.height/2;
                // Простая проверка: попадает ли центр в полигон QR
                let inside = false;
                // Упрощённо: считаем, что QR занимает свою область
                const qrMinX = Math.min(...qrCorners.map(p=>p.x));
                const qrMaxX = Math.max(...qrCorners.map(p=>p.x));
                const qrMinY = Math.min(...qrCorners.map(p=>p.y));
                const qrMaxY = Math.max(...qrCorners.map(p=>p.y));
                if (centerX > qrMinX && centerX < qrMaxX && centerY > qrMinY && centerY < qrMaxY) {
                    continue; // пропускаем сам QR
                }
            }
            // Возвращаем углы bounding box (прямоугольник, выровненный по осям)
            const r = c.rect;
            const corners = [
                {x: r.x, y: r.y},
                {x: r.x + r.width, y: r.y},
                {x: r.x + r.width, y: r.y + r.height},
                {x: r.x, y: r.y + r.height}
            ];
            return corners;
        }
        return null;
    }

    // ========== ОСНОВНОЙ ЦИКЛ ==========
    function processFrame() {
        if (!cameraActive || !video.videoWidth) {
            animationId = requestAnimationFrame(processFrame);
            return;
        }
        if (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
        const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);

        // 1. Детекция QR
        const qr = detectQR(imageData, overlay.width, overlay.height);
        if (qr) {
            qrDetected = true;
            qrCorners = qr.corners;
            scaleMMperPX = qr.mmPerPx;
            // Рисуем зелёную рамку QR
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(qrCorners[0].x, qrCorners[0].y);
            for (let i=1; i<qrCorners.length; i++) ctx.lineTo(qrCorners[i].x, qrCorners[i].y);
            ctx.closePath();
            ctx.stroke();
            statusDiv.innerText = "✅ QR найден. Ищем объект...";
        } else {
            qrDetected = false;
            qrCorners = null;
            scaleMMperPX = null;
            statusDiv.innerText = "⚠️ QR не виден. Поместите маркер в кадр.";
            animationId = requestAnimationFrame(processFrame);
            return;
        }

        // 2. Поиск прямоугольного контура (объекта)
        if (qrDetected && scaleMMperPX) {
            const objectCorners = findRectangularContours(imageData, overlay.width, overlay.height, qrCorners);
            if (objectCorners) {
                selectedContour = objectCorners;
                // Рисуем жёлтую рамку объекта
                ctx.strokeStyle = "#ff0";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(objectCorners[0].x, objectCorners[0].y);
                for (let i=1; i<objectCorners.length; i++) ctx.lineTo(objectCorners[i].x, objectCorners[i].y);
                ctx.closePath();
                ctx.stroke();

                // Вычисляем размеры в мм (ширина и высота bounding box)
                const widthPx = Math.hypot(objectCorners[1].x - objectCorners[0].x, objectCorners[1].y - objectCorners[0].y);
                const heightPx = Math.hypot(objectCorners[2].x - objectCorners[1].x, objectCorners[2].y - objectCorners[1].y);
                const widthMm = widthPx * scaleMMperPX;
                const heightMm = heightPx * scaleMMperPX;
                objectWidth = widthMm;
                objectHeight = heightMm;
                distanceDiv.innerText = `${widthMm.toFixed(1)} x ${heightMm.toFixed(1)} mm`;
                statusDiv.innerText = "Объект найден. Нажмите Сохранить.";
            } else {
                selectedContour = null;
                distanceDiv.innerText = "--- mm";
                statusDiv.innerText = "Объект не найден. Наведите на контрастный прямоугольник.";
            }
        }

        animationId = requestAnimationFrame(processFrame);
    }

    // ========== СОХРАНЕНИЕ ФОТО ==========
    function saveSnapshot() {
        if (!cameraActive || !overlay.width) {
            alert("Камера не активна");
            return;
        }
        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = overlay.width;
        snapCanvas.height = overlay.height;
        const snapCtx = snapCanvas.getContext('2d');
        snapCtx.drawImage(overlay, 0, 0);
        snapCtx.fillStyle = "#0f0";
        snapCtx.font = "20px monospace";
        snapCtx.fillText("MI-AI " + new Date().toLocaleString(), 20, 40);
        if (selectedContour && scaleMMperPX) {
            const sizeText = `${objectWidth.toFixed(1)} x ${objectHeight.toFixed(1)} mm`;
            snapCtx.fillStyle = "yellow";
            snapCtx.font = "bold 28px monospace";
            snapCtx.fillText(sizeText, 20, 90);
        }
        const dataUrl = snapCanvas.toDataURL('image/png');
        const win = window.open();
        win.document.write(`
            <body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
                <img src="${dataUrl}" style="max-width:100%;max-height:85vh;border:1px solid #0f0;">
                <p style="color:#0f0;font-family:monospace;margin-top:20px;text-align:center;">
                    📸 Зажмите фото → "Сохранить в фото"
                </p>
                <button onclick="window.close()" style="background:#0f0;color:#000;padding:10px;margin-top:10px;">Закрыть</button>
            </body>
        `);
    }

    // ========== ТАП ДЛЯ ВЫБОРА ДРУГОГО ОБЪЕКТА (будет доработано) ==========
    // Пока оставим автоматический выбор самого крупного.

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    overlay.addEventListener('touchstart', (e) => {
        // В будущем: тап для выбора другого объекта
        e.preventDefault();
        // Пока ничего не делаем
    });
</script>
</body>
</html>
