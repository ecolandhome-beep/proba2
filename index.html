<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MI-AI: Precision Lab v3</title>
    <style>
        :root { 
            --green: #0f0; 
            --bg: #000;
            --ui-height: 180px; 
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg); color: var(--green); 
            font-family: monospace; overflow: hidden; touch-action: none;
            height: 100dvh; 
        }
        #app { display: flex; flex-direction: column; height: 100%; padding-bottom: env(safe-area-inset-bottom); }
        #canvas-container { 
            flex: 1; position: relative; background: #111; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .ui { 
            height: var(--ui-height); background: #0a0a0a; border-top: 1px solid var(--green); 
            padding: 10px 15px; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto 1fr 1fr; gap: 8px; z-index: 100;
        }
        #display { grid-column: span 2; text-align: center; padding: 5px; border: 1px solid var(--green); background: #001500; }
        #status { font-size: 11px; text-transform: uppercase; opacity: 0.8; }
        #res-val { font-size: 18px; font-weight: bold; color: white; }
        button { 
            background: #000; color: var(--green); border: 1.5px solid var(--green); 
            font-weight: bold; font-family: inherit; font-size: 11px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; min-height: 44px; 
        }
        button:active { background: var(--green); color: #000; }
        button.reset { border-color: #f44; color: #f44; }
        #zoom-window { 
            position: absolute; top: 15px; right: 15px; width: 130px; height: 130px; 
            border: 2px solid var(--green); background: #000; display: none; 
            pointer-events: none; z-index: 1000; image-rendering: pixelated; 
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        #zoom-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <video id="v" style="display:none;" playsinline autoplay></video>
        <canvas id="c"></canvas>
        <div id="zoom-window"><canvas id="zoom-canvas"></canvas></div>
    </div>
    <div class="ui">
        <div id="display">
            <div id="status">Система готова</div>
            <div id="res-val">---</div>
        </div>
        <button onclick="init()">1. КАМЕРА</button>
        <button onclick="capture()">2. ЗАХВАТ</button>
        <button class="reset" onclick="clearPoints()">ОЧИСТКА</button>
        <button onclick="saveResult()">СОХРАНИТЬ</button>
    </div>
</div>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', { alpha: false });
    const zoomWin = document.getElementById('zoom-window'), zc = document.getElementById('zoom-canvas'), zctx = zc.getContext('2d');
    const resVal = document.getElementById('res-val'), statusText = document.getElementById('status');
    let mmPerPx = 0, points = [], isCaptured = false, activePoint = null, baseImage = null;

    async function init() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
            v.srcObject = s; isCaptured = false; points = [];
            statusText.innerText = "ПРЯМОЙ ЭФИР: ПОМЕСТИТЕ ЭТАЛОН";
            requestAnimationFrame(draw);
        } catch (e) { alert("Ошибка камеры: " + e); }
    }

    function draw() {
        if (!isCaptured) {
            if (v.videoWidth > 0) { c.width = v.videoWidth; c.height = v.videoHeight; ctx.drawImage(v, 0, 0); }
            requestAnimationFrame(draw);
        }
    }

    function capture() {
        isCaptured = true;
        baseImage = document.createElement('canvas');
        baseImage.width = c.width; baseImage.height = c.height;
        baseImage.getContext('2d').drawImage(v, 0, 0);
        detectAnchor();
        renderFrame();
    }

    function detectAnchor() {
        const data = ctx.getImageData(0,0,c.width,c.height).data;
        let pts = [];
        for(let i=0; i<data.length; i+=32) {
            if(data[i+2]>100 && data[i+2]>data[i]*1.5 && data[i+2]>data[i+1]*1.5) {
                pts.push({x:(i/4)%c.width, y:Math.floor((i/4)/c.width)});
            }
        }
        if(pts.length > 50) {
            const x1 = Math.min(...pts.map(p=>p.x)), x2 = Math.max(...pts.map(p=>p.x));
            mmPerPx = 40 / (x2 - x1);
            statusText.innerText = "МАСШТАБ ОК. УКАЖИТЕ ТОЧКИ.";
        } else { alert("Эталон не найден!"); isCaptured = false; requestAnimationFrame(draw); }
    }

    function renderFrame() {
        if (!baseImage) return;
        ctx.drawImage(baseImage, 0, 0);
        ctx.strokeStyle = '#0f0'; ctx.lineWidth = Math.max(2, c.width/400); ctx.fillStyle = '#0f0';
        ctx.font = `${Math.max(20, c.width/50)}px monospace`;
        points.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, ctx.lineWidth * 3, 0, 7); ctx.stroke();
            ctx.fillText(i+1, p.x + 15, p.y - 15);
        });
        if(points.length === 2) {
            const d = Math.sqrt(Math.pow(points[1].x-points[0].x,2)+Math.pow(points[1].y-points[0].y,2));
            const res = (d * mmPerPx).toFixed(2);
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[1].x, points[1].y); ctx.stroke();
            resVal.innerText = res + " MM";
        }
    }

    function handleTouch(e) {
        if(!isCaptured) return;
        e.preventDefault();
        const rect = c.getBoundingClientRect();
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * (c.width/rect.width);
        const y = (touch.clientY - rect.top) * (c.height/rect.height);
        if(e.type === 'touchstart') {
            activePoint = points.find(p => Math.hypot(p.x-x, p.y-y) * (rect.width/c.width) < 40);
            if(!activePoint && points.length < 2) { activePoint = {x, y}; points.push(activePoint); }
            zoomWin.style.display = 'block';
        }
        if(activePoint) { activePoint.x = x; activePoint.y = y; updateZoom(x, y); renderFrame(); }
    }

    function updateZoom(x, y) {
        const size = 60; zc.width = 120; zc.height = 120;
        zctx.imageSmoothingEnabled = false;
        zctx.drawImage(c, x - size/2, y - size/2, size, size, 0, 0, 120, 120);
        zctx.strokeStyle = 'red'; zctx.lineWidth = 2;
        zctx.beginPath(); zctx.moveTo(60, 40); zctx.lineTo(60, 80); zctx.moveTo(40, 60); zctx.lineTo(80, 60); zctx.stroke();
    }

    c.addEventListener('touchstart', handleTouch, {passive: false});
    c.addEventListener('touchmove', handleTouch, {passive: false});
    c.addEventListener('touchend', () => { zoomWin.style.display = 'none'; activePoint = null; });

    function clearPoints() { points = []; resVal.innerText = "---"; renderFrame(); }

    function saveResult() {
        const saveCanvas = document.createElement('canvas');
        saveCanvas.width = c.width; saveCanvas.height = c.height;
        const sCtx = saveCanvas.getContext('2d');
        sCtx.drawImage(baseImage, 0, 0);
        sCtx.strokeStyle = '#0f0'; sCtx.lineWidth = Math.max(4, saveCanvas.width / 300); sCtx.fillStyle = '#0f0';
        sCtx.font = `bold ${Math.max(24, saveCanvas.width / 40)}px monospace`;
        points.forEach((p, i) => {
            sCtx.beginPath(); sCtx.arc(p.x, p.y, sCtx.lineWidth * 2.5, 0, 7); sCtx.fill();
            sCtx.fillText(i + 1, p.x + 20, p.y - 20);
        });
        if (points.length === 2) {
            sCtx.beginPath(); sCtx.moveTo(points[0].x, points[0].y); sCtx.lineTo(points[1].x, points[1].y); sCtx.stroke();
            const resText = resVal.innerText;
            const textWidth = sCtx.measureText(resText).width;
            sCtx.fillStyle = 'rgba(0, 0, 0, 0.7)'; sCtx.fillRect(10, 10, textWidth + 40, 60);
            sCtx.fillStyle = '#0f0'; sCtx.fillText(resText, 30, 50);
        }
        const dataUrl = saveCanvas.toDataURL('image/png');
        const newTab = window.open();
        newTab.document.body.innerHTML = `<img src="${dataUrl}" style="width:100%;"><p style="color:#0f0;text-align:center;font-family:monospace;">ЗАЖМИТЕ ФОТО ДЛЯ СОХРАНЕНИЯ</p>`;
    }
</script>
</body>
</html>
