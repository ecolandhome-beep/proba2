<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: Edge Detector 24mm</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #view { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        #target-box { 
            position: absolute; width: 200px; height: 200px; 
            border: 1px dashed rgba(0,255,0,0.3); z-index: 10;
        }

        .ui { 
    background: #0a0a0a; 
    border-top: 1px solid var(--green); 
    padding: 20px; 
    
    /* ГЛАВНЫЙ ФИКС: добавляем системный отступ снизу для Safari */
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 10px; 
    z-index: 100;
}
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <div id="target-box"></div>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <div id="res-panel">
        <div id="status">ГОТОВ К ЗАХВАТУ</div>
        <div id="res-val">---</div>
    </div>
    <button onclick="startCam()">1. КАМЕРА</button>
    <button onclick="analyze()">2. АНАЛИЗ</button>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const resVal = document.getElementById('res-val');
    const status = document.getElementById('status');

    let scale = 0.18; // Предварительный масштаб (мм на пиксель)

    async function startCam() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };
    }

    function analyze() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const size = 200;
        const startX = (canvas.width - size) / 2;
        const startY = (canvas.height - size) / 2;
        
        const imgData = ctx.getImageData(startX, startY, size, size);
        const data = imgData.data;

        // Детекция границ объекта (поиск крайних точек)
        let minX = size, maxX = 0, minY = size, maxY = 0;
        let found = false;

        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const i = (y * size + x) * 4;
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                
                // Если пиксель светлее фона (металл/монета)
                if (brightness > 130) { 
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                    found = true;
                }
            }
        }

        if (found) {
            const widthPx = maxX - minX;
            const heightPx = maxY - minY;
            const objectSizePx = Math.max(widthPx, heightPx);

            // Отрисовка "динамической рамки" захвата
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.strokeRect(startX + minX, startY + minY, widthPx, heightPx);

            // Если мы считаем, что гайка (24мм) должна быть около 130-140 пикселей
            // Вычисляем размер текущего объекта
            const measuredMm = objectSizePx * scale;
            
            status.innerText = "ОБЪЕКТ ЗАХВАЧЕН";
            resVal.innerText = measuredMm.toFixed(2) + " MM";
        } else {
            status.innerText = "ОБЪЕКТ НЕ НАЙДЕН";
            resVal.innerText = "---";
        }
    }
</script>
</body>
</html>
