<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MI-AI: Master Inspect</title>
    <style>
        :root { --green: #0f0; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--green); font-family: monospace; overflow-x: hidden; }
        #view { position: relative; width: 100%; height: 50vh; background: #111; }
        video, #c { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .ui { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #display { grid-column: span 2; text-align: center; padding: 12px; border: 1px solid var(--green); background: #001500; min-height: 60px; }
        #res-val { font-size: 22px; font-weight: bold; color: white; margin-top: 5px; }
        button { background: #000; color: var(--green); border: 2px solid var(--green); padding: 12px; font-weight: bold; font-family: inherit; font-size: 14px; }
        #result-preview { grid-column: span 2; margin-top: 10px; text-align: center; }
        #result-preview img { max-width: 100%; border: 1px solid var(--green); display: none; }
        .save-tip { font-size: 11px; color: #aaa; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div id="view">
    <video id="v" playsinline muted autoplay></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<div class="ui">
    <div id="display">
        <div id="status">ОЖИДАНИЕ СИНЕГО ЭТАЛОНА</div>
        <div id="res-val">---</div>
    </div>
    <button onclick="init()">1. КАМЕРА</button>
    <button onclick="measure()">2. ЗАМЕР</button>
    
    <div id="result-preview">
        <img id="out-img">
        <div class="save-tip" id="tip">↑ Зажмите фото для сохранения в галерею</div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const outImg = document.getElementById('out-img');

    async function init() {
        const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:1280}});
        v.srcObject = s;
        v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
    }

    function measure() {
        ctx.drawImage(v, 0, 0, c.width, c.height);
        const data = ctx.getImageData(0,0,c.width,c.height).data;
        let pts = [];
        
        // Поиск синего цвета (усиленный порог)
        for(let i=0; i<data.length; i+=16) {
            if(data[i+2]>120 && data[i+2]>data[i]*1.8 && data[i+2]>data[i+1]*1.8) {
                pts.push({x:(i/4)%c.width, y:Math.floor((i/4)/c.width)});
            }
        }

        if(pts.length > 40) {
            const x1 = Math.min(...pts.map(p=>p.x)), x2 = Math.max(...pts.map(p=>p.x));
            const y1 = Math.min(...pts.map(p=>p.y)), y2 = Math.max(...pts.map(p=>p.y));
            const w = x2-x1, h = y2-y1;
            const ratio = w/h;

            // ПРОВЕРКА ЭТАЛОНА ПО СООТНОШЕНИЮ (от 1.6 до 2.4 для ластика 2:1)
            if(ratio > 1.6 && ratio < 2.4) {
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 5;
                ctx.strokeRect(x1, y1, w, h);
                const mmPx = 40/w;
                const txt = `L: 40.00mm | H: ${(h*mmPx).toFixed(2)}mm`;
                
                // Наложение графики
                ctx.fillStyle = '#0f0'; ctx.font = 'bold 30px Arial';
                ctx.fillText(txt, x1, y1-15);
                ctx.font = '15px Arial';
                ctx.fillText(`MI-AI LOG | ${new Date().toLocaleString()}`, 20, c.height-20);

                document.getElementById('res-val').innerText = txt;
                document.getElementById('status').innerText = "ЭТАЛОН ПОДТВЕРЖДЕН";
                
                // Конвертация в картинку для сохранения на iPhone
                outImg.src = c.toDataURL('image/png');
                outImg.style.display = 'inline-block';
                document.getElementById('tip').style.display = 'block';
            } else {
                document.getElementById('status').innerText = "ОШИБКА ПРОПОРЦИЙ: " + ratio.toFixed(2);
                document.getElementById('res-val').innerText = "НЕ ЭТАЛОН";
                outImg.style.display = 'none';
            }
        } else { alert("Синий объект не найден!"); }
    }
</script>
</body>
</html>
